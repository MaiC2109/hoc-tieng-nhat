<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本語 — Vocabulary Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <p>Đang tải bài học...</p>
  </div>

  <header class="app-header">
    <div class="app-logo">
      <div class="logo-mark">語</div>
      <div class="logo-text">
        日本語 Vocab
        <span class="logo-sub">Learning Studio</span>
      </div>
    </div>

    <nav class="main-nav">
      <button class="main-nav-btn active" onclick="switchMainSection('vocab')">
        <span class="nav-icon">📖</span> Vocab
      </button>
      <button class="main-nav-btn" disabled>
        <span class="nav-icon">✍️</span> Grammar
        <span class="badge-soon">Soon</span>
      </button>
      <button class="main-nav-btn" disabled>
        <span class="nav-icon">漢</span> Kanji
        <span class="badge-soon">Soon</span>
      </button>
    </nav>

    <div class="header-right">
      <span class="progress-summary" id="global-progress">Loading…</span>
    </div>
  </header>

  <div class="app-body">
    <div class="section-panel active" id="section-vocab">
      <div class="unit-tabs-bar" id="unit-tabs-bar"></div>
      <div class="unit-content-wrap" id="unit-content-wrap"></div>
    </div>

    <div class="section-panel" id="section-grammar">
      <div class="placeholder-panel">
        <div class="placeholder-icon">✍️</div>
        <h3>Grammar Module</h3>
        <p>Grammar lessons and exercises will appear here in a future update.</p>
      </div>
    </div>

    <div class="section-panel" id="section-kanji">
      <div class="placeholder-panel">
        <div class="placeholder-icon">漢</div>
        <h3>Kanji Module</h3>
        <p>Dedicated kanji study with stroke order and radical breakdowns coming soon.</p>
      </div>
    </div>
  </div>

  // <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
