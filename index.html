<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>日本語 — Vocabulary Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" />

<style>
/* ─────────────────────────────────────────────
    DESIGN TOKENS
    Palette: deep ink navy + warm rice paper + 
    vermillion accent + muted sage
───────────────────────────────────────────── */
:root {
  --ink:        #1a1f2e;
  --ink-soft:   #2d3348;
  --ink-mute:   #6b7280;
  --paper:      #f7f5f0;
  --paper-warm: #edeae3;
  --paper-card: #ffffff;
  --vermillion: #c0392b;
  --verm-light: #e8534a;
  --verm-glow:  rgba(192, 57, 43, 0.12);
  --sage:       #5a7a6a;
  --sage-light: #e8f0ec;
  --gold:       #b8860b;
  --gold-light: #fdf3d7;
  --border:      rgba(26, 31, 46, 0.1);
  --border-md:  rgba(26, 31, 46, 0.16);
  --shadow-sm:  0 1px 4px rgba(26,31,46,0.08);
  --shadow-md:  0 4px 16px rgba(26,31,46,0.10);
  --shadow-lg:  0 12px 40px rgba(26,31,46,0.14);
  --radius-sm:  6px;
  --radius-md:  12px;
  --radius-lg:  18px;
  --font-sans:  'Inter', sans-serif;
  --font-ja:     'Noto Sans JP', sans-serif;
  --font-ja-serif: 'Noto Serif JP', serif;
  --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
}

.word-table tbody tr.playing {
  background: var(--verm-glow);
  outline: 1px solid rgba(192,57,43,0.25);
}

.word-table tbody tr.playing .cell-kana,
.word-table tbody tr.playing .cell-kanji {
  color: var(--vermillion);
}

.btn-playing {
  background: var(--sage) !important;
  color: #fff !important;
}

/* ─── RESET & BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─────────────────────────────────────────────
    TIER 1 — TOP NAVIGATION (Main Menu)
───────────────────────────────────────────── */
.app-header {
  background: var(--ink);
  color: #fff;
  display: flex;
  align-items: center;
  gap: 0;
  height: 56px;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}

.app-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-right: 32px;
  flex-shrink: 0;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: var(--vermillion);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ja-serif);
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -1px;
  flex-shrink: 0;
}

.logo-text {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: #fff;
  line-height: 1.2;
}

.logo-sub {
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: block;
  margin-top: 1px;
}

.main-nav {
  display: flex;
  align-items: stretch;
  height: 100%;
  gap: 2px;
  flex: 1;
}

.main-nav-btn {
  position: relative;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 18px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: color var(--transition), background var(--transition);
  border-radius: 0;
  letter-spacing: 0.01em;
  white-space: nowrap;
}

.main-nav-btn:hover:not(:disabled) {
  color: rgba(255,255,255,0.85);
  background: rgba(255,255,255,0.06);
}

.main-nav-btn.active {
  color: #fff;
  background: rgba(255,255,255,0.08);
}

.main-nav-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 16px;
  right: 16px;
  height: 2px;
  background: var(--vermillion);
  border-radius: 2px 2px 0 0;
}

.main-nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.main-nav-btn .nav-icon {
  font-size: 15px;
  line-height: 1;
}

.badge-soon {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.45);
  padding: 2px 5px;
  border-radius: 3px;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-summary {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.02em;
}

.progress-summary strong {
  color: rgba(255,255,255,0.8);
  font-weight: 600;
}

/* ─────────────────────────────────────────────
   APP BODY LAYOUT
───────────────────────────────────────────── */
.app-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - 56px);
}

/* ─────────────────────────────────────────────
   SECTION PANELS (Vocab / Grammar / Kanji)
───────────────────────────────────────────── */
.section-panel { display: none; flex: 1; flex-direction: column; }
.section-panel.active { display: flex; }

.placeholder-panel {
  padding: 60px 24px;
  text-align: center;
  max-width: 500px;
  margin: 40px auto;
  background: var(--paper-card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

.placeholder-icon {
  font-size: 48px;
  margin-bottom: 16px;
}

.placeholder-panel h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
}

.placeholder-panel p {
  font-size: 14px;
  color: var(--ink-mute);
}

/* ─────────────────────────────────────────────
   TIER 2 — UNIT TABS
───────────────────────────────────────────── */
.unit-tabs-bar {
  background: var(--paper-card);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: flex-end;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}

.unit-tabs-bar::-webkit-scrollbar { display: none; }

.unit-tab {
  position: relative;
  padding: 14px 20px 12px;
  border: none;
  background: transparent;
  font-family: var(--font-sans);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink-mute);
  cursor: pointer;
  transition: color var(--transition);
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.unit-tab:hover:not(.active) { color: var(--ink); }

.unit-tab.active {
  color: var(--vermillion);
  border-bottom-color: var(--vermillion);
}

.unit-tab .unit-word-count {
  font-size: 11px;
  color: var(--ink-mute);
  background: var(--paper);
  border-radius: 20px;
  padding: 1px 7px;
  font-weight: 500;
}

.unit-tab.active .unit-word-count {
  background: var(--verm-glow);
  color: var(--vermillion);
}

/* ─────────────────────────────────────────────
   UNIT CONTENT AREA
───────────────────────────────────────────── */
.unit-content-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.unit-panel { display: none; flex: 1; flex-direction: column; }
.unit-panel.active { display: flex; }

/* ─────────────────────────────────────────────
   TIER 3 — PART ACCORDION
───────────────────────────────────────────── */
.parts-container {
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 1100px;
  width: 100%;
  align-self: center;
  flex: 1;
}

.accordion-item {
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--paper-card);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--transition);
}

.accordion-item.open { box-shadow: var(--shadow-md); }

.accordion-header {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  border: none;
  background: transparent;
  cursor: pointer;
  text-align: left;
  transition: background var(--transition);
}

.accordion-header:hover { background: var(--paper); }
.accordion-item.open .accordion-header { background: var(--paper); border-bottom: 1px solid var(--border); }

.accordion-chevron {
  width: 20px;
  height: 20px;
  color: var(--ink-mute);
  flex-shrink: 0;
  transition: transform var(--transition);
}

.accordion-item.open .accordion-chevron { transform: rotate(90deg); }

.accordion-part-label {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-mute);
  flex-shrink: 0;
}

.accordion-part-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  flex: 1;
}

.accordion-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.progress-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
}

.progress-badge.complete {
  background: var(--sage-light);
  color: var(--sage);
}

.progress-badge.in-progress {
  background: var(--gold-light);
  color: var(--gold);
}

.progress-badge.not-started {
  background: var(--paper);
  color: var(--ink-mute);
  border: 1px solid var(--border);
}

.progress-bar-mini {
  width: 60px;
  height: 5px;
  background: var(--paper-warm);
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-mini-fill {
  height: 100%;
  background: var(--sage);
  border-radius: 3px;
  transition: width 0.4s ease;
}

.progress-bar-mini-fill.partial { background: var(--gold); }

/* ─────────────────────────────────────────────
   ACCORDION BODY
───────────────────────────────────────────── */
.accordion-body {
  display: none;
  padding: 0;
}

.accordion-item.open .accordion-body { display: block; }

/* ─────────────────────────────────────────────
   TIER 4 — WORKSPACE SUB-TABS
───────────────────────────────────────────── */
.workspace {
  padding: 16px 18px 18px;
}

.sub-tabs-bar {
  display: flex;
  gap: 4px;
  padding: 4px;
  background: var(--paper);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.sub-tab {
  flex: 1;
  min-width: max-content;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 14px;
  border: none;
  background: transparent;
  font-family: var(--font-sans);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-mute);
  cursor: pointer;
  border-radius: 9px;
  transition: all var(--transition);
  white-space: nowrap;
}

.sub-tab:hover:not(.active) {
  color: var(--ink);
  background: rgba(255,255,255,0.7);
}

.sub-tab.active {
  background: var(--paper-card);
  color: var(--ink);
  font-weight: 600;
  box-shadow: var(--shadow-sm);
}

.sub-tab .tab-icon { font-size: 14px; }

.sub-tabs-panels { position: relative; }
.sub-panel { display: none; }
.sub-panel.active { display: block; }

/* ─────────────────────────────────────────────
   SUB PANEL 1: STUDY & LISTEN
───────────────────────────────────────────── */
.study-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  gap: 10px;
  flex-wrap: wrap;
}

.study-toolbar-left { display: flex; gap: 8px; align-items: center; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-primary {
  background: var(--vermillion);
  color: #fff;
}
.btn-primary:hover { background: var(--verm-light); }

.btn-outline {
  background: transparent;
  border: 1px solid var(--border-md);
  color: var(--ink);
}
.btn-outline:hover { background: var(--paper-warm); }

.btn-ghost {
  background: transparent;
  color: var(--ink-mute);
  padding: 6px 10px;
}
.btn-ghost:hover { background: var(--paper); color: var(--ink); }

.btn-icon {
  width: 34px;
  height: 34px;
  padding: 0;
  justify-content: center;
  background: var(--paper);
  border: 1px solid var(--border);
  color: var(--ink-mute);
  border-radius: var(--radius-sm);
  font-size: 15px;
}
.btn-icon:hover { background: var(--vermillion); color: #fff; border-color: var(--vermillion); }

/* Study word table */
.word-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.word-table th {
  text-align: left;
  padding: 9px 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--ink-mute);
  border-bottom: 1px solid var(--border);
  background: var(--paper);
}

.word-table td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.word-table tbody tr:hover { background: var(--paper); }
.word-table tbody tr:last-child td { border-bottom: none; }

.word-table .cell-num {
  font-size: 12px;
  color: var(--ink-mute);
  font-weight: 500;
  width: 40px;
}

.word-table .cell-kanji {
  font-family: var(--font-ja-serif);
  font-size: 18px;
  color: var(--ink);
  font-weight: 700;
}

.word-table .cell-kana {
  font-family: var(--font-ja);
  font-size: 16px;
  font-weight: 400;
  color: var(--ink);
}

.word-table .cell-meaning {
  color: var(--ink-soft);
  font-size: 14px;
}

.word-table .cell-example {
  color: var(--ink-mute);
  font-size: 13px;
}

.word-table .cell-action { width: 48px; text-align: center; }

/* ─────────────────────────────────────────────
   SUB PANEL 2: FLASHCARD
───────────────────────────────────────────── */
.flashcard-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0 20px;
  gap: 20px;
}

.flashcard-counter {
  font-size: 13px;
  color: var(--ink-mute);
  font-weight: 500;
}

.flashcard-counter span {
  font-weight: 700;
  color: var(--ink);
}

.flashcard-scene {
  width: 100%;
  max-width: 440px;
  height: 260px;
  perspective: 1200px;
  cursor: pointer;
}

.flashcard-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
}

.flashcard-scene.flipped .flashcard-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: var(--shadow-md);
  padding: 30px;
}

.card-front {
  background: var(--ink);
  background-image: radial-gradient(ellipse at 70% 20%, rgba(192,57,43,0.18) 0%, transparent 60%);
  color: #fff;
}

.card-back {
  background: var(--paper-card);
  transform: rotateY(180deg);
  border: 1px solid var(--border);
}

.card-front .card-kanji {
  font-family: var(--font-ja-serif);
  font-size: 44px;
  font-weight: 700;
  color: #fff;
}

.card-front .card-kana {
  font-family: var(--font-ja);
  font-size: 20px;
  font-weight: 300;
  color: rgba(255,255,255,0.65);
  line-height: 1.2;
}

.card-front .card-listen-btn-white {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  margin-top: 10px;
}

.card-front .card-listen-btn-white:hover {
  background: #fff;
  color: var(--ink);
}

.card-back .card-meaning {
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  text-align: center;
}

.card-back .card-kana-small {
  font-family: var(--font-ja);
  font-size: 16px;
  color: var(--ink-mute);
}

.card-back .card-listen-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--verm-glow);
  border: 1px solid rgba(192,57,43,0.2);
  color: var(--vermillion);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  margin-top: 10px;
}

.card-back .card-listen-btn:hover {
  background: var(--vermillion);
  color: #fff;
  border-color: var(--vermillion);
}

.flashcard-nav {
  display: flex;
  align-items: center;
  gap: 14px;
}

.nav-arrow {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid var(--border-md);
  background: var(--paper-card);
  color: var(--ink);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
}

.nav-arrow:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

.flashcard-progress-bar {
  width: 180px;
  height: 4px;
  background: var(--paper-warm);
  border-radius: 2px;
  overflow: hidden;
}

.flashcard-progress-fill {
  height: 100%;
  background: var(--vermillion);
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s ease;
}

/* ─────────────────────────────────────────────
   SUB PANEL 3: QUIZ
───────────────────────────────────────────── */
.quiz-area { display: flex; flex-direction: column; gap: 18px; }

.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.quiz-progress-track {
  flex: 1;
  height: 6px;
  background: var(--paper-warm);
  border-radius: 3px;
  overflow: hidden;
}

.quiz-progress-fill {
  height: 100%;
  background: var(--vermillion);
  border-radius: 3px;
  width: 0%;
  transition: width 0.3s ease;
}

.quiz-score {
  font-size: 13px;
  font-weight: 600;
  color: var(--sage);
  background: var(--sage-light);
  padding: 4px 11px;
  border-radius: 20px;
  flex-shrink: 0;
}

.quiz-card {
  background: var(--paper-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 26px 24px;
  box-shadow: var(--shadow-sm);
}

.quiz-question-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.quiz-q-number {
  background: var(--vermillion);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 3px;
}

.quiz-word-display {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 22px;
}

.quiz-word-kanji {
  font-family: var(--font-ja-serif);
  font-size: 36px;
  color: var(--ink);
  font-weight: 700;
}

.quiz-word-kana {
  font-family: var(--font-ja);
  font-size: 20px;
  font-weight: 400;
  color: var(--ink-mute);
}

.quiz-listen-btn {
  margin-left: auto;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--verm-glow);
  border: 1px solid rgba(192,57,43,0.2);
  color: var(--vermillion);
  font-size: 17px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}

.quiz-listen-btn:hover { background: var(--vermillion); color: #fff; border-color: var(--vermillion); }

.quiz-choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.choice-btn {
  padding: 13px 16px;
  border: 1.5px solid var(--border-md);
  border-radius: var(--radius-sm);
  background: var(--paper-card);
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: all var(--transition);
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
}

.choice-btn:hover:not(:disabled) {
  border-color: var(--vermillion);
  background: var(--verm-glow);
  color: var(--vermillion);
}

.choice-btn.correct {
  border-color: var(--sage);
  background: var(--sage-light);
  color: var(--sage);
}

.choice-btn.wrong {
  border-color: var(--vermillion);
  background: var(--verm-glow);
  color: var(--vermillion);
}

.choice-label {
  width: 22px;
  height: 22px;
  border-radius: 4px;
  background: var(--paper);
  border: 1px solid var(--border);
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--ink-mute);
}

/* Review Screen */
.quiz-review-screen {
  display: none;
  background: var(--paper-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 32px 24px;
  text-align: center;
  box-shadow: var(--shadow-md);
}

.review-emoji { font-size: 48px; margin-bottom: 12px; }
.review-title { font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.review-sub { font-size: 14px; color: var(--ink-mute); margin-bottom: 24px; }

.review-stats {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 24px;
}

.review-stats .review-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.review-stat-val {
  font-size: 28px;
  font-weight: 700;
}

.review-stat-val.green { color: var(--sage); }
.review-stat-val.red { color: var(--vermillion); }

.review-stat-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--ink-mute);
  font-weight: 600;
}

/* ─────────────────────────────────────────────
   SUB PANEL 4: STROKE ORDER
───────────────────────────────────────────── */
.stroke-area { display: flex; flex-direction: column; gap: 16px; }

.stroke-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.stroke-word-selector {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.stroke-word-chip {
  padding: 6px 13px;
  border: 1.5px solid var(--border-md);
  border-radius: 20px;
  font-family: var(--font-ja-serif);
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
  background: var(--paper-card);
  transition: all var(--transition);
}

.stroke-word-chip.active, .stroke-word-chip:hover {
  border-color: var(--vermillion);
  background: var(--verm-glow);
  color: var(--vermillion);
}

.stroke-canvas-area {
  background: var(--paper-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  min-height: 200px;
}

.stroke-kanji-display {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}

.stroke-char-box {
  width: 140px;
  height: 140px;
  border: 1.5px solid var(--border-md);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ja-serif);
  font-size: 72px;
  color: var(--ink);
  background: #fff;
  position: relative;
  cursor: pointer;
}

.stroke-char-box::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 50% 50%;
  opacity: 0.5;
  pointer-events: none;
}

.stroke-char-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-mute);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-align: center;
}

.stroke-placeholder-msg {
  font-size: 13px;
  color: var(--ink-mute);
  text-align: center;
  padding: 16px;
}

.stroke-controls {
  display: flex;
  gap: 8px;
}

/* ─────────────────────────────────────────────
   EMPTY STATE & GLOBAL ELEMENTS
───────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-mute);
  font-size: 14px;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }

@media (max-width: 640px) {
  .app-header { padding: 0 14px; }
  .parts-container { padding: 12px 14px; gap: 8px; }
  .quiz-choices { grid-template-columns: 1fr; }
  .sub-tab { padding: 7px 10px; font-size: 12px; }
  .workspace { padding: 12px 12px 14px; }
  .unit-tabs-bar { padding: 0 14px; }
  .logo-text { display: none; }
  .main-nav-btn { padding: 0 12px; font-size: 13px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">
    <div class="logo-mark">語</div>
    <div class="logo-text">
      日本語 Vocab
      <span class="logo-sub">Learning Studio</span>
    </div>
  </div>

  <nav class="main-nav">
    <button class="main-nav-btn active" onclick="switchMainSection('vocab')">
      <span class="nav-icon">📖</span> Vocab
    </button>
    <button class="main-nav-btn" disabled>
      <span class="nav-icon">✍️</span> Grammar
      <span class="badge-soon">Soon</span>
    </button>
    <button class="main-nav-btn" disabled>
      <span class="nav-icon">漢</span> Kanji
      <span class="badge-soon">Soon</span>
    </button>
  </nav>

  <div class="header-right">
    <span class="progress-summary" id="global-progress">Loading…</span>
  </div>
</header>

<div class="app-body">

  <div class="section-panel active" id="section-vocab">
    <div class="unit-tabs-bar" id="unit-tabs-bar"></div>
    <div class="unit-content-wrap" id="unit-content-wrap"></div>
  </div>

  <div class="section-panel" id="section-grammar">
    <div class="placeholder-panel">
      <div class="placeholder-icon">✍️</div>
      <h3>Grammar Module</h3>
      <p>Grammar lessons and exercises will appear here in a future update.</p>
    </div>
  </div>

  <div class="section-panel" id="section-kanji">
    <div class="placeholder-panel">
      <div class="placeholder-icon">漢</div>
      <h3>Kanji Module</h3>
      <p>Dedicated kanji study with stroke order and radical breakdowns coming soon.</p>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/animcjk@latest/AnimCJK.js"></script>
<script src="data.js"></script>

<script>
'use strict';

const state = {
  activeUnit: null,
  activeAccordion: {}, 
  activeSubTab: {},    
  quizState: {},       // Tracks current question index, pool, score
  flashcardPool: {},   // Holds the shuffled list of words for flashcards
  flashcardIndex: {},  // Tracks index per part
  currentAudio: null,  
  playlist: [],        
  playlistIndex: -1,
  isAutoplay: false
};

// Global state cache to hold extracted kanji structures for AnimCJK
const _strokeState = {};

document.addEventListener('DOMContentLoaded', () => {
  initApp();
});

function initApp() {
  if (typeof vocabularyData === 'undefined' || !Array.isArray(vocabularyData)) {
    document.getElementById('global-progress').textContent = 'No data';
    return;
  }
  
  const units = getUnits();
  if (units.length > 0) {
    state.activeUnit = units[0];
    renderUnitTabs(units);
    renderUnitContent();
    updateGlobalProgress();
  }
}

function switchMainSection(sectionId) {
  document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.main-nav-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('section-' + sectionId);
  if (panel) panel.classList.add('active');
  document.querySelectorAll('.main-nav-btn').forEach(b => {
    if (b.textContent.trim().toLowerCase().includes(sectionId.toLowerCase()))
      b.classList.add('active');
  });
}

function s(v) { return (v !== undefined && v !== null && v !== '') ? String(v) : '—'; }

function escAttr(v) {
  return String(v === undefined || v === null ? '' : v)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/"/g, '&quot;');
}

function escId(str) {
  return encodeURIComponent(str).replace(/%/g, '_');
}

function _shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function _digits(str) {
  const m = String(str || '').match(/\d+/);
  return m ? m[0] : '0';
}

function buildAudioPath(wordObj) {
  if (wordObj.audio) return `audio/${wordObj.audio}`;
  const u = _digits(wordObj.unit);
  const p = _digits(wordObj.part);
  return `audio/u${u}_p${p}_word-${wordObj.id}.mp3`;
}

// Hàm hỗ trợ phát nhạc không làm đảo lộn sự kiện Click xoay card
function playCardAudio(e, wordId, path, partKey) {
  e.stopPropagation();
  playSingleAudio(wordId, path, partKey);
}

function getUnits() {
  if (typeof vocabularyData === 'undefined') return [];
  const units = [...new Set(vocabularyData.map(w => w.unit))];
  return units.sort((a, b) => String(a).localeCompare(String(b), undefined, {numeric: true, sensitivity: 'base'}));
}

function getPartsForUnit(unitName) {
  if (typeof vocabularyData === 'undefined') return [];
  const filtered = vocabularyData.filter(w => w.unit === unitName);
  const parts = [...new Set(filtered.map(w => w.part))];
  return parts.sort((a, b) => String(a).localeCompare(String(b), undefined, {numeric: true, sensitivity: 'base'}));
}

function getWords(unitName, partName) {
  return vocabularyData.filter(w => w.unit === unitName && w.part === partName);
}

function renderUnitTabs(units) {
  const bar = document.getElementById('unit-tabs-bar');
  if (!bar) return;
  
  bar.innerHTML = units.map(u => {
    const totalWords = vocabularyData.filter(w => w.unit === u).length;
    const activeClass = (u === state.activeUnit) ? 'active' : '';
    return `
      <button class="unit-tab ${activeClass}" onclick="selectUnit('${escAttr(u)}')">
        ${u} <span class="unit-word-count">${totalWords}</span>
      </button>
    `;
  }).join('');
}

function selectUnit(unitName) {
  stopAllAudio();
  state.activeUnit = unitName;
  renderUnitTabs(getUnits());
  renderUnitContent();
}

function toggleAccordion(unit, part) {
  const partKey = `${unit}_${part}`;
  const el = document.getElementById(`acc-item-${partKey}`);
  if (!el) return;
  
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    if (state.activeAccordion[unit] === part) {
      state.activeAccordion[unit] = null;
    }
  } else {
    if (state.activeAccordion[unit]) {
      const prev = document.getElementById(`acc-item-${unit}_${state.activeAccordion[unit]}`);
      if (prev) prev.classList.remove('open');
    }
    el.classList.add('open');
    state.activeAccordion[unit] = part;
    
    const curTab = state.activeSubTab[partKey] || 'study';
    switchSubTab(partKey, curTab);
  }
}

function renderUnitContent() {
  const wrap = document.getElementById('unit-content-wrap');
  if (!wrap) return;
  
  const unit = state.activeUnit;
  const parts = getPartsForUnit(unit);
  
  if (parts.length === 0) {
    wrap.innerHTML = `<div class="empty-state">No data available for this Unit.</div>`;
    return;
  }
  
  let html = `<div class="parts-container">`;
  
  parts.forEach((p, idx) => {
    const partKey = `${unit}_${p}`;
    const isOpen = (state.activeAccordion[unit] === p || (!state.activeAccordion[unit] && idx === 0));
    
    if (isOpen && !state.activeAccordion[unit]) {
      state.activeAccordion[unit] = p;
    }
    
    const savedScore = localStorage.getItem(`quiz_${partKey}`);
    let badgeHtml = `<div class="progress-badge not-started">Not Started</div>`;
    let fillWidth = '0%';
    let partialClass = '';
    
    if (savedScore !== null) {
      const [score, total] = savedScore.split('/').map(Number);
      if (total > 0) {
        fillWidth = `${(score / total) * 100}%`;
        if (score === total) {
          badgeHtml = `<div class="progress-badge complete">✓ Passed (${score}/${total})</div>`;
        } else {
          badgeHtml = `<div class="progress-badge in-progress">${score}/${total}</div>`;
          partialClass = 'partial';
        }
      }
    }
    
    const curTab = state.activeSubTab[partKey] || 'study';
    
    html += `
      <div class="accordion-item ${isOpen ? 'open' : ''}" id="acc-item-${escAttr(partKey)}">
        <button class="accordion-header" onclick="toggleAccordion('${escAttr(unit)}', '${escAttr(p)}')">
          <span class="accordion-chevron">▶</span>
          <span class="accordion-part-label">${p}</span>
          <span class="accordion-part-name">Vocabulary Exploration</span>
          <div class="accordion-meta">
            ${badgeHtml}
            <div class="progress-bar-mini">
              <div class="progress-bar-mini-fill ${partialClass}" style="width: ${fillWidth}"></div>
            </div>
          </div>
        </button>
        <div class="accordion-body">
          <div class="workspace">
            <div class="sub-tabs-bar">
              <button class="sub-tab ${curTab === 'study' ? 'active' : ''}" id="tab-btn-${escAttr(partKey)}-study" onclick="switchSubTab('${escAttr(partKey)}', 'study')"><span class="tab-icon">📖</span> Study & Listen</button>
              <button class="sub-tab ${curTab === 'card' ? 'active' : ''}" id="tab-btn-${escAttr(partKey)}-card" onclick="switchSubTab('${escAttr(partKey)}', 'card')"><span class="tab-icon">🎴</span> Flashcard</button>
              <button class="sub-tab ${curTab === 'quiz' ? 'active' : ''}" id="tab-btn-${escAttr(partKey)}-quiz" onclick="switchSubTab('${escAttr(partKey)}', 'quiz')"><span class="tab-icon">📝</span> Quiz</button>
              <button class="sub-tab ${curTab === 'stroke' ? 'active' : ''}" id="tab-btn-${escAttr(partKey)}-stroke" onclick="switchSubTab('${escAttr(partKey)}', 'stroke')"><span class="tab-icon">✍️</span> Stroke Order</button>
            </div>
            <div class="sub-tabs-panels" id="panels-${escAttr(partKey)}">
               </div>
          </div>
        </div>
      </div>
    `;
  });
  
  html += `</div>`;
  wrap.innerHTML = html;

  parts.forEach((p, idx) => {
    const partKey = `${unit}_${p}`;
    const isOpen = (state.activeAccordion[unit] === p);
    if (isOpen) {
      const curTab = state.activeSubTab[partKey] || 'study';
      buildWorkspacePanels(partKey, curTab);
    }
  });
}

function switchSubTab(partKey, tabName) {
  stopAllAudio();
  state.activeSubTab[partKey] = tabName;
  
  const container = document.getElementById(`panels-${partKey}`);
  if (!container) return;
  
  [`study`, `card`, `quiz`, `stroke`].forEach(t => {
    const btn = document.getElementById(`tab-btn-${partKey}-${t}`);
    if (btn) btn.classList.toggle('active', t === tabName);
  });

  buildWorkspacePanels(partKey, tabName);
}

function buildWorkspacePanels(partKey, activeTab) {
  const container = document.getElementById(`panels-${partKey}`);
  if (!container) return;
  
  const [u, p] = partKey.split('_');
  const words = getWords(u, p);
  
  let studyActive = activeTab === 'study' ? 'active' : '';
  let cardActive  = activeTab === 'card' ? 'active' : '';
  let quizActive  = activeTab === 'quiz' ? 'active' : '';
  let strokeActive = activeTab === 'stroke' ? 'active' : '';

  // 1. Study Table
  let rowsHtml = words.map((w, index) => {
    return `
      <tr id="row-${partKey}-${w.id}">
        <td class="cell-num">${index + 1}</td>
        <td class="cell-kanji">${s(w.kanji)}</td>
        <td class="cell-kana">${s(w.kana)}</td>
        <td class="cell-meaning">
          <div style="font-weight:600; color:var(--ink)">${s(w.meaning)}</div>
          <div style="font-size:12px; color:var(--ink-mute); margin-top:2px;">${s(w.hanviet)}</div>
        </td>
        <td class="cell-example">${s(w.example)}</td>
        <td class="cell-action">
          <button class="quiz-listen-btn" style="width:32px; height:32px; font-size:13px;" onclick="playSingleAudio(${w.id}, '${buildAudioPath(w)}', '${partKey}')">🎵</button>
        </td>
      </tr>
    `;
  }).join('');

  let studyHtml = `
    <div class="sub-panel ${studyActive}">
      <div class="study-toolbar">
        <div class="study-toolbar-left">
          <button class="btn btn-primary" id="btn-autoplay-${partKey}" onclick="toggleAutoplay('${partKey}')">▶ Autoplay Audio</button>
        </div>
      </div>
      <table class="word-table">
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th>Kanji</th>
            <th>Kana</th>
            <th>Meaning</th>
            <th>Example</th>
            <th style="width:48px; text-align:center">Audio</th>
          </tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
  `;

  // 2. Flashcard Engine Area
  let cardHtml = `
    <div class="sub-panel ${cardActive}">
      <div class="flashcard-area" id="flashcard-zone-${partKey}">
         </div>
    </div>
  `;

  // 3. Quiz Module Layout
  let quizHtml = `
    <div class="sub-panel ${quizActive}">
      <div class="quiz-area" id="quiz-zone-${partKey}">
         </div>
      <div class="quiz-review-screen" id="quiz-review-${partKey}">
         </div>
    </div>
  `;

  // 4. Stroke Control Order Board
  let strokeHtml = `
    <div class="sub-panel ${strokeActive}">
      <div class="stroke-area">
        <div class="stroke-toolbar">
          <span style="font-size:13px; font-weight:600; color:var(--ink-soft)">Choose Kanji:</span>
          <div class="stroke-word-selector" id="stroke-select-${partKey}"></div>
        </div>
        <div class="stroke-canvas-area">
          <div class="stroke-kanji-display" id="stroke-kanji-container-${partKey}">
            <div class="stroke-placeholder-msg">Select a Kanji from the selector above to practice its stroke order.</div>
          </div>
          <div class="stroke-controls" id="stroke-ctrls-${partKey}" style="display:none;">
            <button class="btn btn-outline" id="btn-stroke-play-${partKey}" onclick="playStrokes('${partKey}')">▶ Play Animation</button>
          </div>
        </div>
      </div>
    </div>
  `;

  container.innerHTML = studyHtml + cardHtml + quizHtml + strokeHtml;

  if (activeTab === 'card') initFlashcardEngine(partKey);
  if (activeTab === 'quiz') initQuizEngine(partKey);
  if (activeTab === 'stroke') initStrokeEngine(partKey);
}

/* ══════════════════════════════════════════════
   CORE ENGINE 1: AUDIO STREAM MANAGER
══════════════════════════════════════════════ */
function stopAllAudio() {
  state.isAutoplay = false;
  document.querySelectorAll("[id^='btn-autoplay-']").forEach(b => b.textContent = '▶ Autoplay Audio');
  document.querySelectorAll('.word-table tbody tr').forEach(r => r.classList.remove('playing'));
  if (state.currentAudio) {
    state.currentAudio.pause();
    state.currentAudio = null;
  }
}

function playSingleAudio(wordId, path, partKey) {
  if (state.isAutoplay) stopAllAudio();
  
  document.querySelectorAll('.word-table tbody tr').forEach(r => r.classList.remove('playing'));
  const row = document.getElementById(`row-${partKey}-${wordId}`);
  if (row) row.classList.add('playing');

  if (state.currentAudio) state.currentAudio.pause();
  
  state.currentAudio = new Audio(path);
  state.currentAudio.onended = () => {
    if (row) row.classList.remove('playing');
  };
  state.currentAudio.onerror = () => {
    if (row) row.classList.remove('playing');
  };
  state.currentAudio.play().catch(e => console.log("Audio play deferred or failed: ", e));
}

function toggleAutoplay(partKey) {
  if (state.isAutoplay) {
    stopAllAudio();
    return;
  }
  
  if (state.currentAudio) state.currentAudio.pause();
  
  state.isAutoplay = true;
  const btn = document.getElementById(`btn-autoplay-${partKey}`);
  if (btn) btn.textContent = '⏹ Stop Autoplay';

  const [u, p] = partKey.split('_');
  const words = getWords(u, p);
  
  state.playlist = words.map(w => ({ id: w.id, path: buildAudioPath(w) }));
  state.playlistIndex = 0;
  
  runAutoplayCycle(partKey);
}

function runAutoplayCycle(partKey) {
  if (!state.isAutoplay || state.playlistIndex >= state.playlist.length) {
    stopAllAudio();
    return;
  }

  document.querySelectorAll('.word-table tbody tr').forEach(r => r.classList.remove('playing'));
  const targetItem = state.playlist[state.playlistIndex];
  const row = document.getElementById(`row-${partKey}-${targetItem.id}`);
  if (row) {
    row.classList.add('playing');
    row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  state.currentAudio = new Audio(targetItem.path);
  state.currentAudio.onended = () => {
    if (row) row.classList.remove('playing');
    state.playlistIndex++;
    setTimeout(() => runAutoplayCycle(partKey), 800);
  };
  state.currentAudio.onerror = () => {
    if (row) row.classList.remove('playing');
    state.playlistIndex++;
    runAutoplayCycle(partKey);
  };
  state.currentAudio.play().catch(() => {
    state.playlistIndex++;
    runAutoplayCycle(partKey);
  });
}

/* ══════════════════════════════════════════════
   CORE ENGINE 2: FLASHCARD VIEWPORTS
══════════════════════════════════════════════ */
function initFlashcardEngine(partKey) {
  const zone = document.getElementById(`flashcard-zone-${partKey}`);
  if (!zone) return;
  
  const [u, p] = partKey.split('_');
  const words = getWords(u, p);
  
  // Trộn thẻ từ vựng (Shuffle) mỗi lần load tab Flashcard
  state.flashcardPool[partKey] = _shuffle(words);
  state.flashcardIndex[partKey] = 0;
  
  renderFlashcard(partKey);
}

function renderFlashcard(partKey) {
  const zone = document.getElementById(`flashcard-zone-${partKey}`);
  if (!zone) return;

  const shuffledWords = state.flashcardPool[partKey] || [];
  const total = shuffledWords.length;
  
  if (total === 0) {
    zone.innerHTML = `<div class="empty-state">No flashcards available.</div>`;
    return;
  }

  let idx = state.flashcardIndex[partKey];
  if (idx >= total) idx = total - 1;
  if (idx < 0) idx = 0;
  state.flashcardIndex[partKey] = idx;

  const currentWord = shuffledWords[idx];
  const progressPct = ((idx + 1) / total) * 100;

  zone.innerHTML = `
    <div class="flashcard-counter">Card <span>${idx + 1}</span> of <span>${total}</span></div>
    
    <div class="flashcard-scene" id="card-scene-${partKey}" onclick="this.classList.toggle('flipped')">
      <div class="flashcard-inner">
        <div class="card-face card-front">
          ${currentWord.kanji && currentWord.kanji !== '—' ? `<div class="card-kanji">${currentWord.kanji}</div>` : ''}
          <div class="card-kana">${s(currentWord.kana)}</div>
          <button class="card-listen-btn-white" onclick="playCardAudio(event, ${currentWord.id}, '${buildAudioPath(currentWord)}', '${partKey}')">🎵</button>
        </div>
        <div class="card-face card-back" onclick="event.stopPropagation();">
          <div class="card-meaning">${s(currentWord.meaning)}</div>
          <div class="card-kana-small">${s(currentWord.kana)} ${currentWord.hanviet ? `(${currentWord.hanviet})` : ''}</div>
          <button class="card-listen-btn" onclick="playCardAudio(event, ${currentWord.id}, '${buildAudioPath(currentWord)}', '${partKey}')">🎵</button>
        </div>
      </div>
    </div>

    <div class="flashcard-nav">
      <button class="nav-arrow" onclick="moveFlashcard('${partKey}', -1)">◀</button>
      <div class="flashcard-progress-bar">
        <div class="flashcard-progress-fill" style="width: ${progressPct}%"></div>
      </div>
      <button class="nav-arrow" onclick="moveFlashcard('${partKey}', 1)">▶</button>
    </div>
  `;
}

function moveFlashcard(partKey, direction) {
  const total = (state.flashcardPool[partKey] || []).length;
  if (total === 0) return;

  let currentIdx = state.flashcardIndex[partKey] || 0;
  currentIdx += direction;
  
  if (currentIdx >= total) currentIdx = 0;
  if (currentIdx < 0) currentIdx = total - 1;
  
  state.flashcardIndex[partKey] = currentIdx;
  renderFlashcard(partKey);
}

/* ══════════════════════════════════════════════
   CORE ENGINE 3: QUIZ SIMULATOR METER
══════════════════════════════════════════════ */
function initQuizEngine(partKey) {
  const [u, p] = partKey.split('_');
  const words = getWords(u, p);
  
  // Trộn ngẫu nhiên câu hỏi (Shuffle) mỗi lần load Quiz
  const generatedQuestions = words.map(w => {
    const distractors = _shuffle(vocabularyData.filter(item => item.meaning !== w.meaning))
                          .slice(0, 3)
                          .map(item => item.meaning);
    const choices = _shuffle([w.meaning, ...distractors]);
    return { word: w, choices: choices, selected: null, status: 'unanswered' };
  });

  state.quizState[partKey] = {
    index: 0,
    score: 0,
    questions: _shuffle(generatedQuestions) // Xử lý tráo đổi vị trí câu hỏi ngẫu nhiên ở đây
  };

  document.getElementById(`quiz-zone-${partKey}`).style.display = 'flex';
  document.getElementById(`quiz-review-${partKey}`).style.display = 'none';

  renderQuizQuestion(partKey);
}

function renderQuizQuestion(partKey) {
  const zone = document.getElementById(`quiz-zone-${partKey}`);
  const quiz = state.quizState[partKey];
  if (!zone || !quiz) return;

  if (quiz.questions.length === 0) {
    zone.innerHTML = `<div class="empty-state">No question sets found.</div>`;
    return;
  }

  const q = quiz.questions[quiz.index];
  const progressPct = (quiz.index / quiz.questions.length) * 100;
  const labels = ['A', 'B', 'C', 'D'];

  zone.innerHTML = `
    <div class="quiz-header">
      <div class="quiz-progress-track">
        <div class="quiz-progress-fill" style="width: ${progressPct}%"></div>
      </div>
      <div class="quiz-score">Score: ${quiz.score}/${quiz.questions.length}</div>
    </div>

    <div class="quiz-card">
      <div class="quiz-question-label">
        <span class="quiz-q-number">Q${quiz.index + 1}</span> Multiple Choice Question
      </div>
      
      <div class="quiz-word-display">
        <div>
          ${q.word.kanji && q.word.kanji !== '—' ? `<div class="quiz-word-kanji">${q.word.kanji}</div>` : ''}
          <div class="quiz-word-kana">${s(q.word.kana)}</div>
        </div>
        <button class="quiz-listen-btn" onclick="playSingleAudio(${q.word.id}, '${buildAudioPath(q.word)}', '${partKey}')">🎵</button>
      </div>

      <div class="quiz-choices">
        ${q.choices.map((c, i) => {
          let btnClass = '';
          if (q.status !== 'unanswered') {
            if (c === q.word.meaning) btnClass = 'correct';
            else if (c === q.selected) btnClass = 'wrong';
          }
          const isDisabled = q.status !== 'unanswered' ? 'disabled' : '';
          return `
            <button class="choice-btn ${btnClass}" ${isDisabled} onclick="submitQuizAnswer('${partKey}', '${escAttr(c)}')">
              <span class="choice-label">${labels[i]}</span> ${s(c)}
            </button>
          `;
        }).join('')}
      </div>

      ${q.status !== 'unanswered' ? `
        <div style="margin-top:20px; display:flex; justify-content:flex-end;">
          <button class="btn btn-primary" onclick="nextQuizQuestion('${partKey}')">
            ${quiz.index + 1 === quiz.questions.length ? 'Finish Quiz' : 'Next Question ➜'}
          </button>
        </div>
      ` : ''}
    </div>
  `;
}

function submitQuizAnswer(partKey, answerStr) {
  const quiz = state.quizState[partKey];
  if (!quiz) return;
  
  const q = quiz.questions[quiz.index];
  if (q.status !== 'unanswered') return;

  q.selected = answerStr;
  if (answerStr === q.word.meaning) {
    q.status = 'correct';
    quiz.score++;
  } else {
    q.status = 'wrong';
  }

  renderQuizQuestion(partKey);
}

function nextQuizQuestion(partKey) {
  const quiz = state.quizState[partKey];
  if (!quiz) return;

  if (quiz.index + 1 < quiz.questions.length) {
    quiz.index++;
    renderQuizQuestion(partKey);
  } else {
    evaluateQuizEnd(partKey);
  }
}

function evaluateQuizEnd(partKey) {
  document.getElementById(`quiz-zone-${partKey}`).style.display = 'none';
  const review = document.getElementById(`quiz-review-${partKey}`);
  if (!review) return;
  
  const quiz = state.quizState[partKey];
  const total = quiz.questions.length;
  const score = quiz.score;
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;

  localStorage.setItem(`quiz_${partKey}`, `${score}/${total}`);
  updateGlobalProgress();
  refreshBadgeOnAccordion(partKey, score, total);

  let emoji = '🎉';
  let title = 'Excellent Work!';
  if (pct < 50) { emoji = '🩹'; title = 'Keep Practicing!'; }
  else if (pct < 80) { emoji = '👍'; title = 'Good Effort!'; }

  review.style.display = 'block';
  review.innerHTML = `
    <div class="review-emoji">${emoji}</div>
    <div class="review-title">${title}</div>
    <div class="review-sub">You finished the quiz for this section!</div>
    
    <div class="review-stats">
      <div class="review-stat">
        <span class="review-stat-val green">${score}</span>
        <span class="review-stat-label">Correct</span>
      </div>
      <div class="review-stat">
        <span class="review-stat-val red">${total - score}</span>
        <span class="review-stat-label">Wrong</span>
      </div>
      <div class="review-stat">
        <span class="review-stat-val" style="color:var(--ink)">${pct}%</span>
        <span class="review-stat-label">Accuracy</span>
      </div>
    </div>

    <button class="btn btn-outline" onclick="initQuizEngine('${partKey}')">🔄 Retry Quiz</button>
  `;
}

function refreshBadgeOnAccordion(partKey, score, total) {
  const item = document.getElementById(`acc-item-${partKey}`);
  if (!item) return;
  
  const meta = item.querySelector('.accordion-meta');
  if (!meta) return;

  const width = `${(score / total) * 100}%`;
  let badgeClass = 'in-progress';
  let partialClass = 'partial';
  let label = `${score}/${total}`;
  
  if (score === total) {
    badgeClass = 'complete';
    partialClass = '';
    label = `✓ Passed (${score}/${total})`;
  }

  meta.innerHTML = `
    <div class="progress-badge ${badgeClass}">${label}</div>
    <div class="progress-bar-mini">
      <div class="progress-bar-mini-fill ${partialClass}" style="width: ${width}"></div>
    </div>
  `;
}

/* ══════════════════════════════════════════════
   CORE ENGINE 4: KANJI STROKE ORDER EXPERT
══════════════════════════════════════════════ */
function initStrokeEngine(partKey) {
  const bar = document.getElementById(`stroke-select-${partKey}`);
  if (!bar) return;

  const [u, p] = partKey.split('_');
  const words = getWords(u, p);
  
  const kanjiSet = new Set();
  words.forEach(w => {
    if (w.kanji && w.kanji !== '—') {
      [...w.kanji].forEach(ch => {
        if (ch.match(/[\u4e00-\u9faf\u3400-\u4dbf]/)) {
          kanjiSet.add(ch);
        }
      });
    }
  });

  const kanjiList = [...kanjiSet];
  if (kanjiList.length === 0) {
    bar.innerHTML = `<span style="font-size:12px; color:var(--ink-mute)">No Kanji words found in this section.</span>`;
    return;
  }

  bar.innerHTML = kanjiList.map(k => {
    return `<button class="stroke-word-chip" id="chip-${partKey}-${escId(k)}" onclick="selectKanjiStroke('${partKey}', '${escAttr(k)}')">${k}</button>`;
  }).join('');
}

function selectKanjiStroke(partKey, kanjiChar) {
  document.querySelectorAll(`#stroke-select-${partKey} .stroke-word-chip`).forEach(c => c.classList.remove('active'));
  
  const chip = document.getElementById(`chip-${partKey}-${escId(kanjiChar)}`);
  if (chip) chip.classList.add('active');

  const container = document.getElementById(`stroke-kanji-container-${partKey}`);
  const ctrlBox = document.getElementById(`stroke-ctrls-${partKey}`);
  if (!container) return;

  _strokeState[partKey] = kanjiChar;

  container.innerHTML = `
    <div>
      <div class="stroke-char-box" id="stroke-box-${partKey}-${escId(kanjiChar)}"></div>
      <div class="stroke-char-label" style="margin-top:8px;">${kanjiChar}</div>
    </div>
  `;

  if (ctrlBox) ctrlBox.style.display = 'flex';
  
  playStrokes(partKey);
}

function playStrokes(partKey) {
  const kanjiChar = _strokeState[partKey] || '';
  if (!kanjiChar) return;
  
  const boxId = `stroke-box-${partKey}-${escId(kanjiChar)}`;
  const box = document.getElementById(boxId);
  if (!box) return;

  box.textContent = ''; // Reset container trước khi vẽ

  if (typeof AnimCJK !== 'undefined') {
    try {
      // Sửa phương pháp gọi thư viện AnimCJK chuẩn hóa dạng Object / Function Injection
      if (typeof AnimCJK.insert === 'function') {
        AnimCJK.insert(box, kanjiChar, { autostart: true, speed: 1.2 });
      } else if (typeof AnimCJK === 'function') {
        new AnimCJK(box, kanjiChar, { autostart: true, speed: 1.2 });
      } else {
        box.textContent = kanjiChar;
      }
    } catch(e) {
      console.log("AnimCJK Error:", e);
      box.textContent = kanjiChar; 
    }
  } else {
    box.textContent = kanjiChar;
  }
}

/* ══════════════════════════════════════════════
   GLOBAL METRIC SUMMARY PROGRESS
══════════════════════════════════════════════ */
function updateGlobalProgress() {
  const el = document.getElementById('global-progress');
  if (!el || typeof vocabularyData === 'undefined') return;

  let passedCount = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('quiz_')) {
      const val = localStorage.getItem(key);
      if (val) {
        const [score, total] = val.split('/').map(Number);
        if (score === total && total > 0) passedCount++;
      }
    }
  }

  el.innerHTML = `Total Progress: <strong>${passedCount}</strong> Section(s) Passed`;
}
</script>
