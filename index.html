<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>日本語 — Vocabulary Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" />

<style>
/* ─────────────────────────────────────────────
    DESIGN TOKENS
    Palette: deep ink navy + warm rice paper + 
    vermillion accent + muted sage
───────────────────────────────────────────── */
:root {
  --ink:        #1a1f2e;
  --ink-soft:   #2d3348;
  --ink-mute:   #6b7280;
  --paper:      #f7f5f0;
  --paper-warm: #edeae3;
  --paper-card: #ffffff;
  --vermillion: #c0392b;
  --verm-light: #e8534a;
  --verm-glow:  rgba(192, 57, 43, 0.12);
  --sage:       #5a7a6a;
  --sage-light: #e8f0ec;
  --gold:       #b8860b;
  --gold-light: #fdf3d7;
  --border:     rgba(26, 31, 46, 0.1);
  --border-md:  rgba(26, 31, 46, 0.16);
  --shadow-sm:  0 1px 4px rgba(26,31,46,0.08);
  --shadow-md:  0 4px 16px rgba(26,31,46,0.10);
  --shadow-lg:  0 12px 40px rgba(26,31,46,0.14);
  --radius-sm:  6px;
  --radius-md:  12px;
  --radius-lg:  18px;
  --font-sans:  'Inter', sans-serif;
  --font-ja:    'Noto Sans JP', sans-serif;
  --font-ja-serif: 'Noto Serif JP', serif;
  --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
}

.word-table tbody tr.playing {
  background: var(--verm-glow);
  outline: 1px solid rgba(192,57,43,0.25);
}

.word-table tbody tr.playing .cell-kana,
.word-table tbody tr.playing .cell-kanji {
  color: var(--vermillion);
}

.btn-playing {
  background: var(--sage) !important;
  color: #fff !important;
}

/* ─── RESET & BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─────────────────────────────────────────────
   TIER 1 — TOP NAVIGATION (Main Menu)
───────────────────────────────────────────── */
.app-header {
  background: var(--ink);
  color: #fff;
  display: flex;
  align-items: center;
  gap: 0;
  height: 56px;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}

.app-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-right: 32px;
  flex-shrink: 0;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: var(--vermillion);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ja-serif);
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -1px;
  flex-shrink: 0;
}

.logo-text {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: #fff;
  line-height: 1.2;
}

.logo-sub {
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: block;
  margin-top: 1px;
}

.main-nav {
  display: flex;
  align-items: stretch;
  height: 100%;
  gap: 2px;
  flex: 1;
}

.main-nav-btn {
  position: relative;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 18px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-family: var(--font-sans);
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: color var(--transition), background var(--transition);
  border-radius: 0;
  letter-spacing: 0.01em;
  white-space: nowrap;
}

.main-nav-btn:hover:not(:disabled) {
  color: rgba(255,255,255,0.85);
  background: rgba(255,255,255,0.06);
}

.main-nav-btn.active {
  color: #fff;
  background: rgba(255,255,255,0.08);
}

.main-nav-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 16px;
  right: 16px;
  height: 2px;
  background: var(--vermillion);
  border-radius: 2px 2px 0 0;
}

.main-nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.main-nav-btn .nav-icon {
  font-size: 15px;
  line-height: 1;
}

.badge-soon {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.45);
  padding: 2px 5px;
  border-radius: 3px;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-summary {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.02em;
}

.progress-summary strong {
  color: rgba(255,255,255,0.8);
  font-weight: 600;
}

/* ─────────────────────────────────────────────
   APP BODY LAYOUT
───────────────────────────────────────────── */
.app-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - 56px);
}

/* ─────────────────────────────────────────────
   SECTION PANELS (Vocab / Grammar / Kanji)
───────────────────────────────────────────── */
.section-panel { display: none; flex: 1; flex-direction: column; }
.section-panel.active { display: flex; }

/* ─────────────────────────────────────────────
   TIER 2 — UNIT TABS
───────────────────────────────────────────── */
.unit-tabs-bar {
  background: var(--paper-card);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: flex-end;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}

.unit-tabs-bar::-webkit-scrollbar { display: none; }

.unit-tab {
  position: relative;
  padding: 14px 20px 12px;
  border: none;
  background: transparent;
  font-family: var(--font-sans);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink-mute);
  cursor: pointer;
  transition: color var(--transition);
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.unit-tab:hover:not(.active) { color: var(--ink); }

.unit-tab.active {
  color: var(--vermillion);
  border-bottom-color: var(--vermillion);
}

.unit-tab .unit-word-count {
  font-size: 11px;
  color: var(--ink-mute);
  background: var(--paper);
  border-radius: 20px;
  padding: 1px 7px;
  font-weight: 500;
}

.unit-tab.active .unit-word-count {
  background: var(--verm-glow);
  color: var(--vermillion);
}

/* ─────────────────────────────────────────────
   UNIT CONTENT AREA
───────────────────────────────────────────── */
.unit-content-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.unit-panel { display: none; flex: 1; flex-direction: column; }
.unit-panel.active { display: flex; }

/* ─────────────────────────────────────────────
   TIER 3 — PART ACCORDION
───────────────────────────────────────────── */
.parts-container {
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 1100px;
  width: 100%;
  align-self: center;
  flex: 1;
}

.accordion-item {
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--paper-card);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--transition);
}

.accordion-item.open { box-shadow: var(--shadow-md); }

.accordion-header {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  border: none;
  background: transparent;
  cursor: pointer;
  text-align: left;
  transition: background var(--transition);
}

.accordion-header:hover { background: var(--paper); }
.accordion-item.open .accordion-header { background: var(--paper); border-bottom: 1px solid var(--border); }

.accordion-chevron {
  width: 20px;
  height: 20px;
  color: var(--ink-mute);
  flex-shrink: 0;
  transition: transform var(--transition);
}

.accordion-item.open .accordion-chevron { transform: rotate(90deg); }

.accordion-part-label {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-mute);
  flex-shrink: 0;
}

.accordion-part-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  flex: 1;
}

.accordion-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.progress-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
}

.progress-badge.complete {
  background: var(--sage-light);
  color: var(--sage);
}

.progress-badge.in-progress {
  background: var(--gold-light);
  color: var(--gold);
}

.progress-badge.not-started {
  background: var(--paper);
  color: var(--ink-mute);
  border: 1px solid var(--border);
}

.progress-bar-mini {
  width: 60px;
  height: 5px;
  background: var(--paper-warm);
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-mini-fill {
  height: 100%;
  background: var(--sage);
  border-radius: 3px;
  transition: width 0.4s ease;
}

.progress-bar-mini-fill.partial { background: var(--gold); }

/* ─────────────────────────────────────────────
   ACCORDION BODY
───────────────────────────────────────────── */
.accordion-body {
  display: none;
  padding: 0;
}

.accordion-item.open .accordion-body { display: block; }

/* ─────────────────────────────────────────────
   TIER 4 — WORKSPACE SUB-TABS
───────────────────────────────────────────── */
.workspace {
  padding: 16px 18px 18px;
}

.sub-tabs-bar {
  display: flex;
  gap: 4px;
  padding: 4px;
  background: var(--paper);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.sub-tab {
  flex: 1;
  min-width: max-content;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 14px;
  border: none;
  background: transparent;
  font-family: var(--font-sans);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-mute);
  cursor: pointer;
  border-radius: 9px;
  transition: all var(--transition);
  white-space: nowrap;
}

.sub-tab:hover:not(.active) {
  color: var(--ink);
  background: rgba(255,255,255,0.7);
}

.sub-tab.active {
  background: var(--paper-card);
  color: var(--ink);
  font-weight: 600;
  box-shadow: var(--shadow-sm);
}

.sub-tab .tab-icon { font-size: 14px; }

.sub-tab-panels { position: relative; }
.sub-panel { display: none; }
.sub-panel.active { display: block; }

/* ─────────────────────────────────────────────
   SUB PANEL 1: STUDY & LISTEN
───────────────────────────────────────────── */
.study-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  gap: 10px;
  flex-wrap: wrap;
}

.study-toolbar-left { display: flex; gap: 8px; align-items: center; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-primary {
  background: var(--vermillion);
  color: #fff;
}
.btn-primary:hover { background: var(--verm-light); }

.btn-outline {
  background: transparent;
  border: 1px solid var(--border-md);
  color: var(--ink);
}
.btn-outline:hover { background: var(--paper-warm); }

.btn-ghost {
  background: transparent;
  color: var(--ink-mute);
  padding: 6px 10px;
}
.btn-ghost:hover { background: var(--paper); color: var(--ink); }

.btn-icon {
  width: 34px;
  height: 34px;
  padding: 0;
  justify-content: center;
  background: var(--paper);
  border: 1px solid var(--border);
  color: var(--ink-mute);
  border-radius: var(--radius-sm);
  font-size: 15px;
}
.btn-icon:hover { background: var(--vermillion); color: #fff; border-color: var(--vermillion); }

/* Study word table */
.word-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.word-table th {
  text-align: left;
  padding: 9px 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--ink-mute);
  border-bottom: 1px solid var(--border);
  background: var(--paper);
}

.word-table td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.word-table tbody tr:hover { background: var(--paper); }
.word-table tbody tr:last-child td { border-bottom: none; }

.word-table .cell-num {
  font-size: 12px;
  color: var(--ink-mute);
  font-weight: 500;
  width: 40px;
}

.word-table .cell-kana {
  font-family: var(--font-ja);
  font-size: 16px;
  font-weight: 400;
  color: var(--ink);
}

.word-table .cell-kanji {
  font-family: var(--font-ja-serif);
  font-size: 18px;
  color: var(--ink);
  font-weight: 700;
}

.word-table .cell-meaning {
  color: var(--ink-soft);
  font-size: 14px;
}

.word-table .cell-example {
  color: var(--ink-mute);
  font-size: 13px;
}

.word-table .cell-action { width: 48px; text-align: center; }

/* ─────────────────────────────────────────────
   SUB PANEL 2: FLASHCARD
───────────────────────────────────────────── */
.flashcard-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0 20px;
  gap: 20px;
}

.flashcard-counter {
  font-size: 13px;
  color: var(--ink-mute);
  font-weight: 500;
}

.flashcard-counter span {
  font-weight: 700;
  color: var(--ink);
}

.flashcard-scene {
  width: 100%;
  max-width: 440px;
  height: 260px;
  perspective: 1200px;
  cursor: pointer;
}

.flashcard-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
}

.flashcard-scene.flipped .flashcard-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: var(--shadow-md);
  padding: 30px;
}

.card-front {
  background: var(--ink);
  background-image: radial-gradient(ellipse at 70% 20%, rgba(192,57,43,0.18) 0%, transparent 60%);
  color: #fff;
}

.card-back {
  background: var(--paper-card);
  transform: rotateY(180deg);
  border: 1px solid var(--border);
}

.card-front .card-hint {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 4px;
}

.card-front .card-kana {
  font-family: var(--font-ja);
  font-size: 42px;
  font-weight: 300;
  color: #fff;
  line-height: 1.2;
}

.card-front .card-kanji {
  font-family: var(--font-ja-serif);
  font-size: 22px;
  font-weight: 700;
  color: rgba(255,255,255,0.55);
}

.card-back .card-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
}

.card-back .card-meaning {
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  text-align: center;
}

.card-back .card-kana-small {
  font-family: var(--font-ja);
  font-size: 16px;
  color: var(--ink-mute);
}

.card-back .card-listen-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--verm-glow);
  border: 1px solid rgba(192,57,43,0.2);
  color: var(--vermillion);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  margin-top: 4px;
}

.card-back .card-listen-btn:hover {
  background: var(--vermillion);
  color: #fff;
  border-color: var(--vermillion);
}

.flip-hint {
  font-size: 11.5px;
  color: var(--ink-mute);
  text-align: center;
}

.flashcard-nav {
  display: flex;
  align-items: center;
  gap: 14px;
}

.nav-arrow {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid var(--border-md);
  background: var(--paper-card);
  color: var(--ink);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
}

.nav-arrow:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

.flashcard-progress-bar {
  width: 180px;
  height: 4px;
  background: var(--paper-warm);
  border-radius: 2px;
  overflow: hidden;
}

.flashcard-progress-fill {
  height: 100%;
  background: var(--vermillion);
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s ease;
}

/* ─────────────────────────────────────────────
   SUB PANEL 3: QUIZ
───────────────────────────────────────────── */
.quiz-area { display: flex; flex-direction: column; gap: 18px; }

.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.quiz-progress-track {
  flex: 1;
  height: 6px;
  background: var(--paper-warm);
  border-radius: 3px;
  overflow: hidden;
}

.quiz-progress-fill {
  height: 100%;
  background: var(--vermillion);
  border-radius: 3px;
  width: 0%;
  transition: width 0.3s ease;
}

.quiz-score {
  font-size: 13px;
  font-weight: 600;
  color: var(--sage);
  background: var(--sage-light);
  padding: 4px 11px;
  border-radius: 20px;
  flex-shrink: 0;
}

.quiz-card {
  background: var(--paper-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 26px 24px;
  box-shadow: var(--shadow-sm);
}

.quiz-question-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.quiz-q-number {
  background: var(--vermillion);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 3px;
}

.quiz-word-display {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 22px;
}

.quiz-word-kana {
  font-family: var(--font-ja);
  font-size: 36px;
  font-weight: 400;
  color: var(--ink);
}

.quiz-word-kanji {
  font-family: var(--font-ja-serif);
  font-size: 20px;
  color: var(--ink-mute);
  font-weight: 700;
}

.quiz-listen-btn {
  margin-left: auto;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--verm-glow);
  border: 1px solid rgba(192,57,43,0.2);
  color: var(--vermillion);
  font-size: 17px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}

.quiz-listen-btn:hover { background: var(--vermillion); color: #fff; border-color: var(--vermillion); }

.quiz-choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.choice-btn {
  padding: 13px 16px;
  border: 1.5px solid var(--border-md);
  border-radius: var(--radius-sm);
  background: var(--paper-card);
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: all var(--transition);
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
}

.choice-btn:hover:not(:disabled) {
  border-color: var(--vermillion);
  background: var(--verm-glow);
  color: var(--vermillion);
}

.choice-btn.correct {
  border-color: var(--sage);
  background: var(--sage-light);

.review-emoji { font-size: 48px; margin-bottom: 12px; }

.review-stats .review-stat {

.review-stat-label {

/* ─────────────────────────────────────────────
   SUB PANEL 4: STROKE ORDER
───────────────────────────────────────────── */
.stroke-area { display: flex; flex-direction: column; gap: 16px; }

.stroke-toolbar {
  display: flex;
  align-items: center;

  flex-wrap: wrap;

.stroke-word-selector {

.stroke-word-chip {

.stroke-word-chip.active, .stroke-word-chip:hover {

.stroke-char-box {

  border: 1.5px solid var(--border-md);

  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ja-serif);

.stroke-char-box::before {

  inset: 0;
  background:
    linear-gradient(var(--border) 1px, transparent 1px),

  background-size: 50% 50%;
  opacity: 0.5;
  pointer-events: none;
}

.stroke-char-label {

}

.stroke-placeholder-msg {

/* ─────────────────────────────────────────────
   EMPTY STATE & GLOBAL ELEMENTS
───────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 40px 20px;

}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }

@media (max-width: 640px) {
  .app-header { padding: 0 14px; }
  .parts-container { padding: 12px 14px; gap: 8px; }
  .quiz-choices { grid-template-columns: 1fr; }
  .sub-tab { padding: 7px 10px; font-size: 12px; }
  .workspace { padding: 12px 12px 14px; }
  .unit-tabs-bar { padding: 0 14px; }
  .logo-text { display: none; }

}
</style>
</head>
<body>

═══════════════════════════════════════ -->
<header class="app-header">

    </button>

<!-- ═══════════════════════════════════════
     APP BODY

<div class="app-body">

<!-- EXTERNAL LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/animcjk@latest/AnimCJK.js"></script>
<script src="data.js"></script>

<!-- CORE JAVASCRIPT -->
<script>
'use strict';

const state = {
  activeUnit: null,
  activeAccordion: {}, 
  activeSubTab: {},    
  quizState: {},       // Theo dõi trạng thái Quiz của từng part
  flashcardIndex: {},  // Chỉ mục từ vựng hiện tại của Flashcard từng part
  currentAudio: null,  // Đối tượng Audio đang chơi độc lập
  playlist: [],        // Danh sách phát tự động liên tục
  playlistIndex: -1,
  isAutoplay: false
};

// Khởi tạo ứng dụng an toàn khi DOM sẵn sàng
document.addEventListener('DOMContentLoaded', () => {
  initApp();
});

function initApp() {
  if (typeof vocabularyData === 'undefined' || !Array.isArray(vocabularyData)) {
    document.getElementById('global-progress').textContent = 'No data';
    return;
  }
  
  const units = getUnits();
  if (units.length > 0) {
    state.activeUnit = units[0];
    renderUnitTabs(units);
    renderUnitContent();
    updateGlobalProgress();
  }
}

function switchMainSection(sectionId) {
  document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.main-nav-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('section-' + sectionId);
  if (panel) panel.classList.add('active');
  document.querySelectorAll('.main-nav-btn').forEach(b => {
    if (b.textContent.trim().toLowerCase().includes(sectionId.toLowerCase()))
      b.classList.add('active');
  });
}

function s(v) { return (v !== undefined && v !== null && v !== '') ? String(v) : '—'; }

function escAttr(v) {
  return String(v === undefined || v === null ? '' : v)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/"/g, '&quot;');
}

function _shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function _digits(str) {
  const m = String(str || '').match(/\d+/);
  return m ? m[0] : '0';
}

function buildAudioPath(wordObj) {
  const u = _digits(wordObj.unit);
  const p = _digits(wordObj.part);
  return `audio/u${u}_p${p}_word-${wordObj.id}.mp3`;
}

function getUnits() {
  if (typeof vocabularyData === 'undefined') return [];
  const units = [...new Set(vocabularyData.map(w => w.unit))];
  return units.sort((a, b) => String(a).localeCompare(String(b), undefined, {numeric: true, sensitivity: 'base'}));
}

function getPartsForUnit(unitName) {
  if (typeof vocabularyData === 'undefined') return [];
  const filtered = vocabularyData.filter(w => w.unit === unitName);
  const parts = [...new Set(filtered.map(w => w.part))];
  return parts.sort((a, b) => String(a).localeCompare(String(b), undefined, {numeric: true, sensitivity: 'base'}));
}

function getWords(unitName, partName) {
  return vocabularyData.filter(w => w.unit === unitName && w.part === partName);
}

// RENDER TIER 2 — UNIT TABS
function renderUnitTabs(units) {
  const bar = document.getElementById('unit-tabs-bar');
  if (!bar) return;
  
  bar.innerHTML = units.map(u => {
    const totalWords = vocabularyData.filter(w => w.unit === u).length;
    const activeClass = (u === state.activeUnit) ? 'active' : '';
    return `
      <button class="unit-tab ${activeClass}" onclick="selectUnit('${escAttr(u)}')">
        ${u} <span class="unit-word-count">${totalWords}</span>
      </button>
    `;
  }).join('');
}

function selectUnit(unitName) {
  stopAllAudio();
  state.activeUnit = unitName;
  document.querySelectorAll('.unit-tab').forEach(t => t.classList.remove('active'));
  renderUnitTabs(getUnits());
  renderUnitContent();
}

// RENDER TIER 3 & TIER 4 CONTENT
function renderUnitContent() {
  const wrap = document.getElementById('unit-content-wrap');
  if (!wrap) return;
  
  const unit = state.activeUnit;
  const parts = getPartsForUnit(unit);
  
  if (parts.length === 0) {
    wrap.innerHTML = `<div class="empty-state">No data available for this Unit.</div>`;
    return;
  }
  
  let html = `<div class="parts-container">`;
  
  parts.forEach((p, idx) => {
    const partKey = `${unit}_${p}`;
    const words = getWords(unit, p);
    const isOpen = (state.activeAccordion[unit] === p || (!state.activeAccordion[unit] && idx === 0));
    
    if (isOpen && !state.activeAccordion[unit]) {
      state.activeAccordion[unit] = p;
    }
    
    // Đọc điểm Quiz từ localStorage để hiển thị Badge tiến độ an toàn
    const savedScore = localStorage.getItem(`quiz_${partKey}`);
    let badgeHtml = `<div class="progress-badge not-started">Not Started</div>`;
    let fillWidth = '0%';
    let partialClass = '';
    
    if (savedScore !== null) {
      const [score, total] = savedScore.split('/').map(Number);
      if (total > 0) {
        fillWidth = `${(score / total) * 100}%`;
        if (score === total) {
          badgeHtml = `<div class="progress-badge complete">✓ Pass (${score}/${total})</div>`;
        } else {
          badgeHtml = `<div class="progress-badge in-progress">${score}/${total}</div>`;
          partialClass = 'partial';
        }
      }
    }
    
    const curTab = state.activeSubTab[partKey] || 'study';
    
    html += `
      <div class="accordion-item ${isOpen ? 'open' : ''}" id="acc-item-${escAttr(partKey)}">
        <button class="accordion-header" onclick="toggleAccordion('${escAttr(unit)}', '${escAttr(p)}')">
          <span class="accordion-chevron">▶</span>
          <span class="accordion-part-label">${p}</span>
          <span class="accordion-part-name">Vocabulary Exploration</span>
          <div class="accordion-meta">
            ${badgeHtml}
            <div class="progress-bar-mini">
              <div class="progress-bar-mini-fill ${partialClass}" style="width: ${fillWidth}"></div>
            </div>
          </div>
        </button>
        <div class="accordion-body">
          <div class="workspace">
            <div class="sub-tabs-bar">
              <button class="sub-tab ${curTab === 'study' ? 'active' : ''}" onclick="switchSubTab('${escAttr(partKey)}', 'study')">📖 Study & Listen</button>
              <button class="sub-tab ${curTab === 'card' ? 'active' : ''}" onclick="switchSubTab('${escAttr(partKey)}', 'card')">🎴 Flashcard</button>
              <button class="sub-tab ${curTab === 'quiz' ? 'active' : ''}" onclick="switchSubTab('${escAttr(partKey)}', 'quiz')">📝 Quiz</button>
              <button class="sub-tab ${curTab === 'stroke' ? 'active' : ''}" onclick="switchSubTab('${escAttr(partKey)}', 'stroke')">✍️ Tập Viết</button>
            </div>
            <div class="sub-tab-panels" id="panels-${escAttr(partKey)}">
              ${renderSubPanels(unit, p, curTab)}
            </div>
          </div>
        </div>
      </div>
    `;
  });
  
  html += `</div>`;
  wrap.innerHTML = html;
  
  // Kích hoạt bổ trợ cấu trúc đặc thù như thư viện tập viết nét chữ sau khi chèn HTML
  parts.forEach(p => {
    const partKey = `${unit}_${p}`;
    if (state.activeSubTab[partKey] === 'stroke') {
      initStrokePanel(unit, p);
    }
  });
}

function toggleAccordion(unit, p) {
  stopAllAudio();
  const partKey = `${unit}_${p}`;
  const currentActive = state.activeAccordion[unit];
  
  if (currentActive === p) {
    state.activeAccordion[unit] = null;
  } else {
    state.activeAccordion[unit] = p;
  }
  renderUnitContent();
}

function switchSubTab(partKey, tabId) {
  stopAllAudio();
  state.activeSubTab[partKey] = tabId;
  const [unit, part] = partKey.split('_');
  renderUnitContent();
}

// RENDER WORKSPACE TIERS
function renderSubPanels(unit, part, activeTab) {
  const partKey = `${unit}_${part}`;
  const words = getWords(unit, part);
  
  let studyActive = activeTab === 'study' ? 'active' : '';
  let cardActive = activeTab === 'card' ? 'active' : '';
  let quizActive = activeTab === 'quiz' ? 'active' : '';
  let strokeActive = activeTab === 'stroke' ? 'active' : '';
  
  // TIER 4.1 — STUDY PANEL (STRICTLY 6 COLUMNS)
  let studyHtml = `
    <div class="sub-panel ${studyActive}">
      <div class="study-toolbar">
        <div class="study-toolbar-left">
          <button class="btn btn-primary" id="btn-autoplay-${escAttr(partKey)}" onclick="toggleAutoplayAll('${escAttr(unit)}', '${escAttr(part)}')">▶ Nghe Toàn Bộ</button>
        </div>
      </div>
      <table class="word-table">
        <thead>
          <tr>
            <th class="cell-num">No.</th>
            <th>Kanji</th>
            <th>Kana</th>
            <th>Meaning</th>
            <th>Example</th>
            <th class="cell-action">Listen</th>
          </tr>
        </thead>
        <tbody>
          ${words.map((w, index) => `
            <tr id="row-${partKey}-${w.id}">
              <td class="cell-num">${index + 1}</td>
              <td class="cell-kanji">${s(w.kanji)}</td>
              <td class="cell-kana">${s(w.kana)}</td>
              <td class="cell-meaning">${s(w.meaning)}</td>
              <td class="cell-example">${s(w.example)}</td>
              <td class="cell-action">
                <button class="btn-icon" id="btn-audio-${w.id}" onclick="playSingleAudio(${w.id}, '${buildAudioPath(w)}')">🎵</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  
  // TIER 4.2 — FLASHCARD PANEL
  if (!state.flashcardIndex[partKey]) state.flashcardIndex[partKey] = 0;
  const curCardIdx = state.flashcardIndex[partKey];
  const activeWord = words[curCardIdx] || words[0];
  const progressPercent = words.length ? ((curCardIdx + 1) / words.length) * 100 : 0;
  
  let cardHtml = `
    <div class="sub-panel ${cardActive}">
      ${words.length ? `
        <div class="flashcard-area">
          <div class="flashcard-counter">Thẻ số <span>${curCardIdx + 1}</span> / ${words.length}</div>
          <div class="flashcard-scene" onclick="this.classList.toggle('flipped')">
            <div class="flashcard-inner">
              <div class="card-face card-front">
                <div class="card-hint">KANA</div>
                <div class="card-kana">${s(activeWord.kana)}</div>
                <div class="card-kanji">${s(activeWord.kanji)}</div>
                <div class="flip-hint" style="margin-top:20px; opacity:0.6;">Chạm để lật mặt sau 🔄</div>
              </div>
              <div class="card-face card-back">
                <div class="card-label">Ý NGHĨA</div>
                <div class="card-meaning">${s(activeWord.meaning)}</div>
                <div class="card-kana-small">${s(activeWord.kana)}</div>
                <button class="card-listen-btn" onclick="event.stopPropagation(); playSingleAudio(${activeWord.id}, '${buildAudioPath(activeWord)}')">🎵</button>
              </div>
            </div>
          </div>
          <div class="flashcard-nav">
            <button class="nav-arrow" onclick="moveFlashcard('${escAttr(partKey)}', -1)">◀</button>
            <div class="flashcard-progress-bar">
              <div class="flashcard-progress-fill" style="width: ${progressPercent}%"></div>
            </div>
            <button class="nav-arrow" onclick="moveFlashcard('${escAttr(partKey)}', 1)">▶</button>
          </div>
        </div>
      ` : '<div class="empty-state">No cards available.</div>'}
    </div>
  `;
  
  // TIER 4.3 — QUIZ PANEL
  let quizHtml = `
    <div class="sub-panel ${quizActive}" id="quiz-workspace-${escAttr(partKey)}">
      <div class="quiz-area">
        <div class="quiz-header">
          <div class="quiz-progress-track">
            <div class="quiz-progress-fill" id="quiz-progress-${escAttr(partKey)}" style="width: 0%"></div>
          </div>
          <div class="quiz-score" id="quiz-live-score-${escAttr(partKey)}">Score: 0</div>
          <button class="btn btn-outline" onclick="startQuiz('${escAttr(unit)}', '${escAttr(part)}')">🔄 Làm Lại Quiz</button>
        </div>
        
        <div class="quiz-card" id="quiz-card-box-${escAttr(partKey)}">
          <div style="text-align:center; padding: 20px 0;">
            <button class="btn btn-primary" onclick="startQuiz('${escAttr(unit)}', '${escAttr(part)}')">🚀 Bắt Đầu Làm Bài Trắc Nghiệm</button>
          </div>
        </div>
      </div>
      
      <div class="quiz-review-screen" id="quiz-review-${escAttr(partKey)}">
        <div class="review-emoji">🎉</div>
        <div class="review-title">Hoàn Thành Bài Học!</div>
        <div class="review-sub">Tiến độ của bạn đã được ghi nhận tự động vào hệ thống.</div>
        <div class="review-stats">
          <div class="review-stat">
            <span class="review-stat-val green" id="rev-correct-${escAttr(partKey)}">0</span>
            <span class="review-stat-label">Đúng</span>
          </div>
          <div class="review-stat">
            <span class="review-stat-val red" id="rev-wrong-${escAttr(partKey)}">0</span>
            <span class="review-stat-label">Sai</span>
          </div>
        </div>
        <button class="btn btn-primary" onclick="startQuiz('${escAttr(unit)}', '${escAttr(part)}')">Thử Thách Lại</button>
      </div>
    </div>
  `;
  
  // TIER 4.4 — STROKE WRITING PANEL
  let strokeHtml = `
    <div class="sub-panel ${strokeActive}">
      <div class="stroke-area">
        <div class="stroke-toolbar">
          <span style="font-size:13px; font-weight:600; color:var(--ink-soft)">Chọn từ tập viết:</span>
          <div class="stroke-word-selector" id="stroke-select-${escAttr(partKey)}"></div>
        </div>
        <div class="stroke-canvas-area">
          <div class="stroke-kanji-display" id="stroke-kanji-container-${escAttr(partKey)}">
            <div class="stroke-placeholder-msg">Hãy chọn một từ vựng có Hán tự ở danh sách trên để luyện viết theo nét nét chữ chuẩn quy tắc.</div>
          </div>
          <div class="stroke-controls" id="stroke-ctrls-${escAttr(partKey)}" style="display:none;">
            <button class="btn btn-outline" id="btn-stroke-play-${escAttr(partKey)}">▶ Chạy Hoạt Ảnh</button>
          </div>
        </div>
      </div>
    </div>
  `;
  
  return studyHtml + cardHtml + quizHtml + strokeHtml;
}

// AUDIO ENGINE
function playSingleAudio(id, path) {
  stopAllAudio();
  const btn = document.getElementById(`btn-audio-${id}`);
  if (btn) btn.classList.add('btn-playing');
  
  state.currentAudio = new Audio(path);
  state.currentAudio.play().catch(err => console.log("Audio file missing:", path));
  
  state.currentAudio.onended = () => {
    if (btn) btn.classList.remove('btn-playing');
    state.currentAudio = null;
  };
}

function stopAllAudio() {
  if (state.currentAudio) {
    state.currentAudio.pause();
    state.currentAudio = null;
  }
  state.isAutoplay = false;
  state.playlist = [];
  state.playlistIndex = -1;
  document.querySelectorAll('.btn-icon').forEach(b => b.classList.remove('btn-playing'));
  document.querySelectorAll('.btn-primary').forEach(b => {
    if (b.id && b.id.startsWith('btn-autoplay-')) b.textContent = '▶ Nghe Toàn Bộ';
  });
  document.querySelectorAll('.word-table tbody tr').forEach(tr => tr.classList.remove('playing'));
}

function toggleAutoplayAll(unit, part) {
  const partKey = `${unit}_${part}`;
  const masterBtn = document.getElementById(`btn-autoplay-${partKey}`);
  
  if (state.isAutoplay) {
    stopAllAudio();
    if (masterBtn) masterBtn.textContent = '▶ Nghe Toàn Bộ';
    return;
  }
  
  stopAllAudio();
  state.isAutoplay = true;
  if (masterBtn) masterBtn.textContent = '⏹ Dừng Phát';
  
  state.playlist = getWords(unit, part);
  state.playlistIndex = 0;
  playNextInPlaylist(partKey);
}

function playNextInPlaylist(partKey) {
  if (!state.isAutoplay || state.playlistIndex >= state.playlist.length) {
    stopAllAudio();
    return;
  }
  
  document.querySelectorAll('.word-table tbody tr').forEach(tr => tr.classList.remove('playing'));
  
  const word = state.playlist[state.playlistIndex];
  const row = document.getElementById(`row-${partKey}-${word.id}`);
  if (row) {
    row.classList.add('playing');
    row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
  
  const path = buildAudioPath(word);
  state.currentAudio = new Audio(path);
  state.currentAudio.play().catch(e => {
    console.log("Missing audio path:", path);
    setTimeout(() => {
      state.playlistIndex++;
      playNextInPlaylist(partKey);
    }, 1000);
  });
  
  state.currentAudio.onended = () => {
    state.playlistIndex++;
    setTimeout(() => {
      playNextInPlaylist(partKey);
    }, 800); 
  };
}

// FLASHCARD ENGINE
function moveFlashcard(partKey, steps) {
  const [unit, part] = partKey.split('_');
  const words = getWords(unit, part);
  if (!words.length) return;
  
  let currentIdx = state.flashcardIndex[partKey] || 0;
  currentIdx += steps;
  
  if (currentIdx < 0) currentIdx = words.length - 1;
  if (currentIdx >= words.length) currentIdx = 0;
  
  state.flashcardIndex[partKey] = currentIdx;
  
  renderUnitContent();
}

// QUIZ SYSTEM LOGIC
function startQuiz(unit, part) {
  const partKey = `${unit}_${part}`;
  const words = getWords(unit, part);
  if (words.length < 1) return;
  
  // Trộn câu hỏi ngẫu nhiên bằng Thuật toán Fisher-Yates
  const shuffledQuestions = _shuffle(words);
  
  state.quizState[partKey] = {
    questions: shuffledQuestions,
    currentIndex: 0,
    correctCount: 0,
    wrongCount: 0
  };
  
  // Ẩn bảng kết quả cũ nếu đang hiển thị
  const reviewScreen = document.getElementById(`quiz-review-${partKey}`);
  if (reviewScreen) reviewScreen.style.display = 'none';
  
  const cardBox = document.getElementById(`quiz-card-box-${partKey}`);
  if (cardBox) cardBox.style.display = 'block';
  
  renderQuizQuestion(partKey);
}

function renderQuizQuestion(partKey) {
  const quiz = state.quizState[partKey];
  if (!quiz) return;
  
  const total = quiz.questions.length;
  const currentWord = quiz.questions[quiz.currentIndex];
  
  // Cập nhật thanh tiến độ câu hỏi trắc nghiệm
  const progressFill = document.getElementById(`quiz-progress-${partKey}`);
  if (progressFill) progressFill.style.width = `${(quiz.currentIndex / total) * 100}%`;
  
  const liveScore = document.getElementById(`quiz-live-score-${partKey}`);
  if (liveScore) liveScore.style.setContent = `Score: ${quiz.correctCount}`;
  
  // Sinh 3 đáp án sai từ vựng cùng Part ngẫu nhiên
  const pool = vocabularyData.filter(w => w.meaning !== currentWord.meaning);
  const shuffledPool = _shuffle(pool);
  const distractors = shuffledPool.slice(0, 3).map(w => w.meaning);
  
  const choices = _shuffle([currentWord.meaning, ...distractors]);
  const cardBox = document.getElementById(`quiz-card-box-${partKey}`);
  
  if (!cardBox) return;
  
  cardBox.innerHTML = `
    <div class="quiz-question-label">
      <span class="quiz-q-number">CÂU HỎI ${quiz.currentIndex + 1} / ${total}</span> Nghĩa của từ này là gì?
    </div>
    <div class="quiz-word-display">
      <div class="quiz-word-kana">${s(currentWord.kana)}</div>
      ${currentWord.kanji && currentWord.kanji !== '—' ? `<div class="quiz-word-kanji">${currentWord.kanji}</div>` : ''}
      <button class="quiz-listen-btn" onclick="playSingleAudio(${currentWord.id}, '${buildAudioPath(currentWord)}')">🎵</button>
    </div>
    <div class="quiz-choices">
      ${choices.map((choice, i) => {
        const labels = ['A', 'B', 'C', 'D'];
        return `
          <button class="choice-btn" onclick="submitQuizAnswer(this, '${escAttr(partKey)}', '${escAttr(choice)}', '${escAttr(currentWord.meaning)}')">
            <span class="choice-label">${labels[i]}</span> ${s(choice)}
          </button>
        `;
      }).join('')}
    </div>
  `;
}

function submitQuizAnswer(btn, partKey, chosenAnswer, correctAnswer) {
  const quiz = state.quizState[partKey];
  if (!quiz) return;
  
  // Vô hiệu hóa tất cả các nút đáp án khác sau khi đã chọn
  const parent = btn.parentElement;
  if (parent) {
    parent.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  }
  
  if (chosenAnswer === correctAnswer) {
    btn.classList.add('correct');
    quiz.correctCount++;
  } else {
    btn.classList.add('wrong');
    quiz.wrongCount++;
    // Hiển thị nút có đáp án chính xác cho học viên đối chiếu học tập
    if (parent) {
      parent.querySelectorAll('.choice-btn').forEach(b => {
        if (b.textContent.includes(correctAnswer)) b.classList.add('correct');
      });
    }
  }
  
  const liveScore = document.getElementById(`quiz-live-score-${partKey}`);
  if (liveScore) liveScore.textContent = `Score: ${quiz.correctCount}`;
  
  // Chuyển sang câu hỏi kế tiếp sau 1.2 giây
  setTimeout(() => {
    quiz.currentIndex++;
    if (quiz.currentIndex < quiz.questions.length) {
      renderQuizQuestion(partKey);
    } else {
      finishQuiz(partKey);
    }
  }, 1200);
}

function finishQuiz(partKey) {
  const quiz = state.quizState[partKey];
  if (!quiz) return;
  
  const total = quiz.questions.length;
  
  // Lưu kết quả bài tập tối ưu an toàn vào bộ nhớ trình duyệt localStorage
  localStorage.setItem(`quiz_${partKey}`, `${quiz.correctCount}/${total}`);
  
  const cardBox = document.getElementById(`quiz-card-box-${partKey}`);
  if (cardBox) cardBox.style.display = 'none';
  
  const reviewScreen = document.getElementById(`quiz-review-${partKey}`);
  if (reviewScreen) {
    reviewScreen.style.display = 'block';
    const fillProgress = document.getElementById(`quiz-progress-${partKey}`);
    if (fillProgress) fillProgress.style.width = '100%';
    
    const txtCorrect = document.getElementById(`rev-correct-${partKey}`);
    const txtWrong = document.getElementById(`rev-wrong-${partKey}`);
    if (txtCorrect) txtCorrect.textContent = quiz.correctCount;
    if (txtWrong) txtWrong.textContent = quiz.wrongCount;
  }
  
  // Làm mới tiến độ hiển thị trực quan ở Accordion và thanh menu đầu trang
  const [unit, part] = partKey.split('_');
  updateGlobalProgress();
  
  // Cập nhật trực tiếp UI badge mà không cần re-render toàn bộ gây mất vị trí cuộn chuột
  const accItem = document.getElementById(`acc-item-${partKey}`);
  if (accItem) {
    const meta = accItem.querySelector('.accordion-meta');
    if (meta) {
      let badgeStyle = "progress-badge in-progress";
      let checkText = `${quiz.correctCount}/${total}`;
      let partialClass = "progress-bar-mini-fill partial";
      
      if (quiz.correctCount === total) {
        badgeStyle = "progress-badge complete";
        checkText = `✓ Pass (${quiz.correctCount}/${total})`;
        partialClass = "progress-bar-mini-fill";
      }
      
      meta.innerHTML = `
        <div class="${badgeStyle}">${checkText}</div>
        <div class="progress-bar-mini">
          <div class="${partialClass}" style="width: ${(quiz.correctCount/total)*100}%"></div>
        </div>
      `;
    }
  }
}

function updateGlobalProgress() {
  const units = getUnits();
  let totalParts = 0;
  let completedParts = 0;
  
  units.forEach(u => {
    const parts = getPartsForUnit(u);
    totalParts += parts.length;
    parts.forEach(p => {
      const score = localStorage.getItem(`${u}_${p}`);
      if (score !== null) {
        const [correct, total] = score.split('/').map(Number);
        if (correct === total && total > 0) completedParts++;
      }
    });
  });
  
  const globalLbl = document.getElementById('global-progress');
  if (globalLbl) {
    globalLbl.innerHTML = `Tổng tiến độ: <strong>${completedParts}/${totalParts}</strong> phần hoàn hảo`;
  }
}

// KANJI WRITING SYSTEM (INTEGRATION WITH ANIMCJK LIBRARY)
function initStrokePanel(unit, part) {
  const partKey = `${unit}_${part}`;
  const words = getWords(unit, part);
  const selector = document.getElementById(`stroke-select-${partKey}`);
  if (!selector) return;
  
  // Lọc chỉ chọn những từ có chứa Hán tự thực sự (Kanji)
  const kanjiWords = words.filter(w => w.kanji && w.kanji !== '—' && /[\u4e00-\u9faf]/.test(w.kanji));
  
  if (kanjiWords.length === 0) {
    selector.innerHTML = '<span style="font-size:13px; color:var(--ink-mute)">Không tìm thấy Hán tự (Kanji) nào trong phần này để tập viết.</span>';
    return;
  }
  
  selector.innerHTML = kanjiWords.map(w => `
    <button class="stroke-word-chip" onclick="displayKanjiStrokes(this, '${escAttr(partKey)}', '${escAttr(w.kanji)}')">${w.kanji}</button>
  `).join('');
}

function displayKanjiStrokes(btn, partKey, kanjiStr) {
  const parent = document.getElementById(`stroke-select-${partKey}`);
  if (parent) {
    parent.querySelectorAll('.stroke-word-chip').forEach(c => c.classList.remove('active'));
  }
  btn.classList.add('active');
  
  const container = document.getElementById(`stroke-kanji-container-${partKey}`);
  const ctrls = document.getElementById(`stroke-ctrls-${partKey}`);
  if (!container) return;
  
  container.innerHTML = '';
  if (ctrls) ctrls.style.display = 'flex';
  
  // Tách chuỗi từ vựng thành từng ký tự Hán tự đơn lẻ
  const characters = [...kanjiStr].filter(ch => /[\u4e00-\u9faf]/.test(ch));
  
  characters.forEach(char => {
    const boxId = `char-${partKey}-${char.charCodeAt(0)}`;
    const div = document.createElement('div');
    div.className = 'stroke-char-box';
    div.id = boxId;
    div.setAttribute('data-char', char);
    
    const label = document.createElement('div');
    label.className = 'stroke-char-label';
    label.style.position = 'absolute';
    label.style.bottom = '4px';
    label.textContent = 'Chạm để viết';
    
    div.appendChild(label);
    container.appendChild(div);
    
    // Khởi tạo hoạt ảnh nét chữ ban đầu thông qua AnimCJK CDN
    try {
      if (typeof AnimCJK !== 'undefined') {
        div.innerHTML = ''; 
        AnimCJK.insert(boxId, char, { width: 130, height: 130, sType: 'draw' });
      } else {
        div.textContent = char;
      }
    } catch(e) {
      div.textContent = char;
    }
    
    // Gắn sự kiện click vào ô vuông để tự động vẽ lại nét chữ
    div.onclick = () => {
      try {
        if (typeof AnimCJK !== 'undefined') {
          div.innerHTML = '';
          AnimCJK.insert(boxId, char, { width: 130, height: 130, sType: 'draw' });
        }
      } catch(err) { console.log(err); }
    };
  });
  
  // Thiết lập sự kiện nút điều khiển phát toàn chuỗi chữ cái
  const playBtn = document.getElementById(`btn-stroke-play-${partKey}`);
  if (playBtn) {
    playBtn.onclick = () => {
      characters.forEach(char => {
        const boxId = `char-${partKey}-${char.charCodeAt(0)}`;
        const div = document.getElementById(boxId);
        if (div && typeof AnimCJK !== 'undefined') {
          div.innerHTML = '';
          AnimCJK.insert(boxId, char, { width: 130, height: 130, sType: 'draw' });
        }
      });
    };
  }
}
