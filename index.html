<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>日本語 — Vocabulary Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" />

<style>
:root {
  --ink: #1a1f2e; --ink-soft: #2d3348; --ink-mute: #6b7280;
  --paper: #f7f5f0; --paper-warm: #edeae3; --paper-card: #ffffff;
  --vermillion: #c0392b; --verm-light: #e8534a; --verm-glow: rgba(192, 57, 43, 0.12);
  --sage: #5a7a6a; --sage-light: #e8f0ec; --gold: #b8860b; --gold-light: #fdf3d7;
  --border: rgba(26, 31, 46, 0.1); --border-md: rgba(26, 31, 46, 0.16);
  --shadow-sm: 0 1px 4px rgba(26,31,46,0.08); --shadow-md: 0 4px 16px rgba(26,31,46,0.10);
  --radius-sm: 6px; --radius-md: 12px; --radius-lg: 18px;
  --font-sans: 'Inter', sans-serif; --font-ja: 'Noto Sans JP', sans-serif; --font-ja-serif: 'Noto Serif JP', serif;
  --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; line-height: 1.6; -webkit-font-smoothing: antialiased; }

/* HEADER & NAV */
.app-header { background: var(--ink); color: #fff; display: flex; align-items: center; height: 56px; padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.25); }
.app-logo { display: flex; align-items: center; gap: 10px; margin-right: 32px; }
.logo-mark { width: 32px; height: 32px; background: var(--vermillion); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--font-ja-serif); font-size: 16px; font-weight: 700; color: #fff; }
.logo-text { font-size: 13px; font-weight: 600; color: #fff; line-height: 1.2; }
.logo-sub { font-size: 10px; color: rgba(255,255,255,0.45); font-weight: 400; display: block; }
.main-nav { display: flex; height: 100%; }
.main-nav-btn { position: relative; display: flex; align-items: center; gap: 7px; padding: 0 18px; border: none; background: transparent; color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--transition); }
.main-nav-btn:hover:not(:disabled) { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.06); }
.main-nav-btn.active { color: #fff; background: rgba(255,255,255,0.08); }
.main-nav-btn.active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: var(--vermillion); }
.main-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.badge-soon { font-size: 9px; font-weight: 700; background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.45); padding: 2px 5px; border-radius: 3px; margin-left: 4px; }
.header-right { margin-left: auto; font-size: 12px; color: rgba(255,255,255,0.45); }
.header-right strong { color: rgba(255,255,255,0.8); }

/* TABS & ACCORDION */
.unit-tabs-bar { background: var(--paper-card); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; overflow-x: auto; scrollbar-width: none; }
.unit-tabs-bar::-webkit-scrollbar { display: none; }
.unit-tab { padding: 14px 20px 12px; border: none; background: transparent; font-size: 13.5px; font-weight: 500; color: var(--ink-mute); cursor: pointer; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 8px; }
.unit-tab.active { color: var(--vermillion); border-bottom-color: var(--vermillion); }
.unit-word-count { font-size: 11px; color: var(--ink-mute); background: var(--paper); border-radius: 20px; padding: 1px 7px; }
.unit-tab.active .unit-word-count { background: var(--verm-glow); color: var(--vermillion); }

.parts-container { padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; max-width: 1100px; width: 100%; align-self: center; flex: 1; }
.accordion-item { border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--paper-card); overflow: hidden; box-shadow: var(--shadow-sm); }
.accordion-header { width: 100%; display: flex; align-items: center; gap: 12px; padding: 14px 18px; border: none; background: transparent; cursor: pointer; }
.accordion-header:hover, .accordion-item.open .accordion-header { background: var(--paper); }
.accordion-item.open .accordion-header { border-bottom: 1px solid var(--border); }
.accordion-chevron { color: var(--ink-mute); transition: transform var(--transition); }
.accordion-item.open .accordion-chevron { transform: rotate(90deg); }
.accordion-part-label { font-size: 13px; font-weight: 700; color: var(--ink-mute); letter-spacing: 0.08em; }
.accordion-part-name { font-size: 15px; font-weight: 600; flex: 1; }
.accordion-meta { display: flex; align-items: center; gap: 8px; }
.accordion-body { display: none; }
.accordion-item.open .accordion-body { display: block; }

/* WORKSPACE & SUB TABS */
.workspace { padding: 16px 18px 18px; }
.sub-tabs-bar { display: flex; gap: 4px; padding: 4px; background: var(--paper); border-radius: var(--radius-md); margin-bottom: 20px; }
.sub-tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; border: none; background: transparent; font-size: 12.5px; font-weight: 500; color: var(--ink-mute); cursor: pointer; border-radius: 9px; transition: all var(--transition); }
.sub-tab.active { background: var(--paper-card); color: var(--ink); font-weight: 600; box-shadow: var(--shadow-sm); }
.sub-panel { display: none; }
.sub-panel.active { display: block; }

/* TABLES & CONTROLS */
.study-toolbar { margin-bottom: 14px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--transition); }
.btn-primary { background: var(--vermillion); color: #fff; }
.btn-primary:hover { background: var(--verm-light); }
.btn-outline { background: transparent; border: 1px solid var(--border-md); color: var(--ink); }
.btn-outline:hover { background: var(--paper-warm); }

.word-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.word-table th { text-align: left; padding: 9px 14px; font-size: 11px; font-weight: 600; color: var(--ink-mute); border-bottom: 1px solid var(--border); background: var(--paper); }
.word-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.word-table tbody tr:hover { background: var(--paper); }
.word-table tbody tr.playing { background: var(--verm-glow); outline: 1px solid rgba(192,57,43,0.25); }
.word-table tbody tr.playing .cell-kana, .word-table tbody tr.playing .cell-kanji { color: var(--vermillion); }
.cell-num { font-size: 12px; color: var(--ink-mute); width: 40px; }
.cell-kanji { font-family: var(--font-ja-serif); font-size: 18px; font-weight: 700; }
.cell-kana { font-family: var(--font-ja); font-size: 16px; }

/* FLASHCARD */
.flashcard-area { display: flex; flex-direction: column; align-items: center; padding: 10px 0 20px; gap: 20px; }
.flashcard-counter { font-size: 13px; color: var(--ink-mute); }
.flashcard-counter span { font-weight: 700; color: var(--ink); }
.flashcard-scene { width: 100%; max-width: 440px; height: 260px; perspective: 1200px; cursor: pointer; }
.flashcard-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1); }
.flashcard-scene.flipped .flashcard-inner { transform: rotateY(180deg); }
.card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; box-shadow: var(--shadow-md); padding: 30px; }
.card-front { background: var(--ink); background-image: radial-gradient(ellipse at 70% 20%, rgba(192,57,43,0.18) 0%, transparent 60%); color: #fff; }
.card-back { background: var(--paper-card); transform: rotateY(180deg); border: 1px solid var(--border); }
.card-front .card-kanji { font-family: var(--font-ja-serif); font-size: 44px; font-weight: 700; }
.card-front .card-kana { font-family: var(--font-ja); font-size: 20px; color: rgba(255,255,255,0.65); }
.card-front .card-listen-btn-white { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition); margin-top: 10px; }
.card-front .card-listen-btn-white:hover { background: #fff; color: var(--ink); }
.card-back .card-meaning { font-size: 26px; font-weight: 700; text-align: center; }
.card-back .card-kana-small { font-family: var(--font-ja); font-size: 16px; color: var(--ink-mute); }
.card-back .card-listen-btn, .quiz-listen-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--verm-glow); border: 1px solid rgba(192,57,43,0.2); color: var(--vermillion); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
.card-back .card-listen-btn:hover, .quiz-listen-btn:hover { background: var(--vermillion); color: #fff; }
.flashcard-nav { display: flex; align-items: center; gap: 14px; }
.nav-arrow { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border-md); background: var(--paper-card); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); }
.nav-arrow:hover { background: var(--ink); color: #fff; }
.flashcard-progress-bar { width: 180px; height: 4px; background: var(--paper-warm); border-radius: 2px; overflow: hidden; }
.flashcard-progress-fill { height: 100%; background: var(--vermillion); width: 0%; transition: width 0.3s ease; }

/* QUIZ */
.quiz-area { display: flex; flex-direction: column; gap: 18px; }
.quiz-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.quiz-progress-track { flex: 1; height: 6px; background: var(--paper-warm); border-radius: 3px; overflow: hidden; }
.quiz-progress-fill { height: 100%; background: var(--vermillion); width: 0%; transition: width 0.3s ease; }
.quiz-score { font-size: 13px; font-weight: 600; color: var(--sage); background: var(--sage-light); padding: 4px 11px; border-radius: 20px; }
.quiz-card { background: var(--paper-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 26px 24px; box-shadow: var(--shadow-sm); }
.quiz-question-label { font-size: 11px; font-weight: 600; color: var(--ink-mute); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.quiz-q-number { background: var(--vermillion); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; }
.quiz-word-display { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
.quiz-word-kanji { font-family: var(--font-ja-serif); font-size: 36px; font-weight: 700; }
.quiz-word-kana { font-family: var(--font-ja); font-size: 20px; color: var(--ink-mute); }
.quiz-listen-btn { margin-left: auto; width: 40px; height: 40px; }
.quiz-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.choice-btn { padding: 13px 16px; border: 1.5px solid var(--border-md); border-radius: var(--radius-sm); background: var(--paper-card); font-size: 14px; font-weight: 500; cursor: pointer; transition: all var(--transition); text-align: left; display: flex; align-items: center; gap: 10px; }
.choice-btn:hover:not(:disabled) { border-color: var(--vermillion); background: var(--verm-glow); color: var(--vermillion); }
.choice-btn.correct { border-color: var(--sage); background: var(--sage-light); color: var(--sage); }
.choice-btn.wrong { border-color: var(--vermillion); background: var(--verm-glow); color: var(--vermillion); }
.choice-label { width: 22px; height: 22px; border-radius: 4px; background: var(--paper); border: 1px solid var(--border); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; color: var(--ink-mute); }
.quiz-review-screen { display: none; background: var(--paper-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 32px 24px; text-align: center; box-shadow: var(--shadow-md); }
.review-emoji { font-size: 48px; margin-bottom: 12px; }
.review-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.review-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
.review-stat { display: flex; flex-direction: column; align-items: center; }
.review-stat-val { font-size: 28px; font-weight: 700; }
.review-stat-val.green { color: var(--sage); }
.review-stat-val.red { color: var(--vermillion); }
.review-stat-label { font-size: 11px; color: var(--ink-mute); font-weight: 600; }

/* STROKE ORDER */
.stroke-area { display: flex; flex-direction: column; gap: 16px; }
.stroke-toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.stroke-word-selector { display: flex; gap: 6px; flex-wrap: wrap; }
.stroke-word-chip { padding: 6px 13px; border: 1.5px solid var(--border-md); border-radius: 20px; font-family: var(--font-ja-serif); font-size: 16px; font-weight: 700; cursor: pointer; background: var(--paper-card); transition: all var(--transition); }
.stroke-word-chip.active, .stroke-word-chip:hover { border-color: var(--vermillion); background: var(--verm-glow); color: var(--vermillion); }
.stroke-canvas-area { background: var(--paper-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; min-height: 200px; }
.stroke-kanji-display { display: flex; gap: 16px; justify-content: center; }
.stroke-char-box { width: 140px; height: 140px; border: 1.5px solid var(--border-md); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 72px; background: #fff; position: relative; cursor: pointer; }
.stroke-char-box::before { content: ''; position: absolute; inset: 0; background: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 50% 50%; opacity: 0.5; pointer-events: none; }
.stroke-char-label { font-size: 11px; font-weight: 600; color: var(--ink-mute); text-align: center; }

/* MISC & BADGES */
.progress-badge { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 20px; }
.progress-badge.complete { background: var(--sage-light); color: var(--sage); }
.progress-badge.in-progress { background: var(--gold-light); color: var(--gold); }
.progress-badge.not-started { background: var(--paper); color: var(--ink-mute); border: 1px solid var(--border); }
.progress-bar-mini { width: 60px; height: 5px; background: var(--paper-warm); border-radius: 3px; overflow: hidden; }
.progress-bar-mini-fill { height: 100%; background: var(--sage); width: 0%; transition: width 0.4s ease; }
.progress-bar-mini-fill.partial { background: var(--gold); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--ink-mute); font-size: 14px; }

@media (max-width: 640px) {
  .parts-container { padding: 12px 14px; }
  .quiz-choices { grid-template-columns: 1fr; }
  .logo-text { display: none; }
  .main-nav-btn { padding: 0 12px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">
    <div class="logo-mark">語</div>
    <div class="logo-text">日本語 Vocab <span class="logo-sub">Learning Studio</span></div>
  </div>
  <nav class="main-nav">
    <button class="main-nav-btn active">📖 Vocab</button>
    <button class="main-nav-btn" disabled>✍️ Grammar <span class="badge-soon">Soon</span></button>
    <button class="main-nav-btn" disabled>漢 Kanji <span class="badge-soon">Soon</span></button>
  </nav>
  <div class="header-right" id="global-progress">Loading…</div>
</header>

<div class="app-body">
  <div class="section-panel active">
    <div class="unit-tabs-bar" id="unit-tabs-bar"></div>
    <div class="unit-content-wrap" id="unit-content-wrap"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/animcjk@latest/AnimCJK.js"></script>
<script src="data.js"></script>

<script>
'use strict';

const state = {
  activeUnit: null, activeAccordion: {}, activeSubTab: {},    
  quizState: {}, flashcardPool: {}, flashcardIndex: {},  
  currentAudio: null, playlist: [], playlistIndex: -1, isAutoplay: false
};
const _strokeState = {};

document.addEventListener('DOMContentLoaded', () => {
  if (typeof vocabularyData === 'undefined' || !Array.isArray(vocabularyData)) {
    document.getElementById('global-progress').textContent = 'No data';
    return;
  }
  const units = getUnits();
  if (units.length > 0) {
    state.activeUnit = units[0];
    renderUnitTabs(units);
    renderUnitContent();
    updateGlobalProgress();
  }
});

function s(v) { return (v !== undefined && v !== null && v !== '') ? String(v) : '—'; }
function escAttr(v) { return String(v ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function escId(str) { return encodeURIComponent(str).replace(/%/g, '_'); }
function _shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function buildAudioPath(w) {
  if (w.audio) return `audio/${w.audio}`;
  const u = String(w.unit || '').match(/\d+/)?.[0] || '0';
  const p = String(w.part || '').match(/\d+/)?.[0] || '0';
  return `audio/u${u}_p${p}_word-${w.id}.mp3`;
}
function playCardAudio(e, id, path, partKey) { e.stopPropagation(); playSingleAudio(id, path, partKey); }

function getUnits() {
  return [...new Set(vocabularyData.map(w => w.unit))].sort((a, b) => String(a).localeCompare(String(b), undefined, {numeric: true}));
}
function getPartsForUnit(unitName) {
  return [...new Set(vocabularyData.filter(w => w.unit === unitName).map(w => w.part))].sort((a, b) => String(a).localeCompare(String(b), undefined, {numeric: true}));
}
function getWords(unitName, partName) { return vocabularyData.filter(w => w.unit === unitName && w.part === partName); }

function renderUnitTabs(units) {
  const bar = document.getElementById('unit-tabs-bar');
  if (!bar) return;
  bar.innerHTML = units.map(u => `
    <button class="unit-tab ${u === state.activeUnit ? 'active' : ''}" onclick="selectUnit('${escAttr(u)}')">
      ${u} <span class="unit-word-count">${vocabularyData.filter(w => w.unit === u).length}</span>
    </button>
  `).join('');
}

function selectUnit(unitName) {
  stopAllAudio();
  state.activeUnit = unitName;
  renderUnitTabs(getUnits());
  renderUnitContent();
}

function toggleAccordion(unit, part) {
  const partKey = `${unit}_${part}`;
  const el = document.getElementById(`acc-item-${partKey}`);
  if (!el) return;
  
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    if (state.activeAccordion[unit] === part) state.activeAccordion[unit] = null;
  } else {
    if (state.activeAccordion[unit]) {
      const prev = document.getElementById(`acc-item-${unit}_${state.activeAccordion[unit]}`);
      if (prev) prev.classList.remove('open');
    }
    el.classList.add('open');
    state.activeAccordion[unit] = part;
    switchSubTab(partKey, state.activeSubTab[partKey] || 'study');
  }
}

function renderUnitContent() {
  const wrap = document.getElementById('unit-content-wrap');
  if (!wrap) return;
  const unit = state.activeUnit;
  const parts = getPartsForUnit(unit);
  
  let html = `<div class="parts-container">`;
  parts.forEach((p, idx) => {
    const partKey = `${unit}_${p}`;
    const isOpen = (state.activeAccordion[unit] === p || (!state.activeAccordion[unit] && idx === 0));
    if (isOpen && !state.activeAccordion[unit]) state.activeAccordion[unit] = p;
    
    const savedScore = localStorage.getItem(`quiz_${partKey}`);
    let badgeHtml = `<div class="progress-badge not-started">Not Started</div>`, fillWidth = '0%', partialClass = '';
    if (savedScore) {
      const [score, total] = savedScore.split('/').map(Number);
      fillWidth = `${(score / total) * 100}%`;
      badgeHtml = score === total ? `<div class="progress-badge complete">✓ Passed (${score}/${total})</div>` : `<div class="progress-badge in-progress">${score}/${total}</div>`;
      if (score !== total) partialClass = 'partial';
    }
    
    const curTab = state.activeSubTab[partKey] || 'study';
    html += `
      <div class="accordion-item ${isOpen ? 'open' : ''}" id="acc-item-${escAttr(partKey)}">
        <button class="accordion-header" onclick="toggleAccordion('${escAttr(unit)}', '${escAttr(p)}')">
          <span class="accordion-chevron">▶</span>
          <span class="accordion-part-label" style="margin-right:8px">${p}</span>
          <span class="accordion-part-name">Vocabulary Exploration</span>
          <div class="accordion-meta">${badgeHtml}<div class="progress-bar-mini"><div class="progress-bar-mini-fill ${partialClass}" style="width: ${fillWidth}"></div></div></div>
        </button>
        <div class="accordion-body">
          <div class="workspace">
            <div class="sub-tabs-bar">
              <button class="sub-tab ${curTab === 'study' ? 'active' : ''}" id="tab-btn-${escAttr(partKey)}-study" onclick="switchSubTab('${escAttr(partKey)}', 'study')">📖 Study</button>
              <button class="sub-tab ${curTab === 'card' ? 'active' : ''}" id="tab-btn-${escAttr(partKey)}-card" onclick="switchSubTab('${escAttr(partKey)}', 'card')">🎴 Flashcard</button>
              <button class="sub-tab ${curTab === 'quiz' ? 'active' : ''}" id="tab-btn-${escAttr(partKey)}-quiz" onclick="switchSubTab('${escAttr(partKey)}', 'quiz')">📝 Quiz</button>
              <button class="sub-tab ${curTab === 'stroke' ? 'active' : ''}" id="tab-btn-${escAttr(partKey)}-stroke" onclick="switchSubTab('${escAttr(partKey)}', 'stroke')">✍️ Stroke</button>
            </div>
            <div class="sub-tabs-panels" id="panels-${escAttr(partKey)}"></div>
          </div>
        </div>
      </div>
    `;
  });
  wrap.innerHTML = html + `</div>`;

  parts.forEach(p => {
    if (state.activeAccordion[unit] === p) buildWorkspacePanels(`${unit}_${p}`, state.activeSubTab[`${unit}_${p}`] || 'study');
  });
}

function switchSubTab(partKey, tabName) {
  stopAllAudio();
  state.activeSubTab[partKey] = tabName;
  [`study`, `card`, `quiz`, `stroke`].forEach(t => {
    const btn = document.getElementById(`tab-btn-${partKey}-${t}`);
    if (btn) btn.classList.toggle('active', t === tabName);
  });
  buildWorkspacePanels(partKey, tabName);
}

function buildWorkspacePanels(partKey, activeTab) {
  const container = document.getElementById(`panels-${partKey}`);
  if (!container) return;
  const [u, p] = partKey.split('_');
  const words = getWords(u, p);
  
  let studyHtml = `
    <div class="sub-panel ${activeTab === 'study' ? 'active' : ''}">
      <div class="study-toolbar"><button class="btn btn-primary" id="btn-autoplay-${partKey}" onclick="toggleAutoplay('${partKey}')">▶ Autoplay Audio</button></div>
      <table class="word-table">
        <thead><tr><th style="width:40px">#</th><th>Kanji</th><th>Kana</th><th>Meaning</th><th>Example</th><th style="width:48px; text-align:center">Audio</th></tr></thead>
        <tbody>${words.map((w, i) => `
          <tr id="row-${partKey}-${w.id}">
            <td class="cell-num">${i + 1}</td>
            <td class="cell-kanji">${s(w.kanji)}</td>
            <td class="cell-kana">${s(w.kana)}</td>
            <td class="cell-meaning"><div style="font-weight:600">${s(w.meaning)}</div><div style="font-size:12px; color:var(--ink-mute)">${s(w.hanviet)}</div></td>
            <td class="cell-example">${s(w.example)}</td>
            <td><button class="quiz-listen-btn" style="width:32px; height:32px; font-size:13px;" onclick="playSingleAudio(${w.id}, '${buildAudioPath(w)}', '${partKey}')">🎵</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  let cardHtml = `<div class="sub-panel ${activeTab === 'card' ? 'active' : ''}"><div class="flashcard-area" id="flashcard-zone-${partKey}"></div></div>`;
  let quizHtml = `<div class="sub-panel ${activeTab === 'quiz' ? 'active' : ''}"><div class="quiz-area" id="quiz-zone-${partKey}"></div><div class="quiz-review-screen" id="quiz-review-${partKey}"></div></div>`;
  let strokeHtml = `
    <div class="sub-panel ${activeTab === 'stroke' ? 'active' : ''}">
      <div class="stroke-area">
        <div class="stroke-toolbar"><span style="font-size:13px; font-weight:600">Choose Kanji:</span><div class="stroke-word-selector" id="stroke-select-${partKey}"></div></div>
        <div class="stroke-canvas-area">
          <div class="stroke-kanji-display" id="stroke-kanji-container-${partKey}"><div class="stroke-placeholder-msg">Select a Kanji to display animation.</div></div>
        </div>
      </div>
    </div>`;

  container.innerHTML = studyHtml + cardHtml + quizHtml + strokeHtml;
  if (activeTab === 'card') initFlashcardEngine(partKey);
  if (activeTab === 'quiz') initQuizEngine(partKey);
  if (activeTab === 'stroke') initStrokeEngine(partKey);
}

/* AUDIO MANAGER */
function stopAllAudio() {
  state.isAutoplay = false;
  document.querySelectorAll("[id^='btn-autoplay-']").forEach(b => b.textContent = '▶ Autoplay Audio');
  document.querySelectorAll('.word-table tbody tr').forEach(r => r.classList.remove('playing'));
  if (state.currentAudio) { state.currentAudio.pause(); state.currentAudio = null; }
}

function playSingleAudio(wordId, path, partKey) {
  if (state.isAutoplay) stopAllAudio();
  document.querySelectorAll('.word-table tbody tr').forEach(r => r.classList.remove('playing'));
  const row = document.getElementById(`row-${partKey}-${wordId}`);
  if (row) row.classList.add('playing');
  if (state.currentAudio) state.currentAudio.pause();
  
  state.currentAudio = new Audio(path);
  state.currentAudio.onended = () => row?.classList.remove('playing');
  state.currentAudio.onerror = () => row?.classList.remove('playing');
  state.currentAudio.play().catch(e => console.log(e));
}

function toggleAutoplay(partKey) {
  if (state.isAutoplay) { stopAllAudio(); return; }
  if (state.currentAudio) state.currentAudio.pause();
  state.isAutoplay = true;
  document.getElementById(`btn-autoplay-${partKey}`).textContent = '⏹ Stop Autoplay';
  
  const [u, p] = partKey.split('_');
  state.playlist = getWords(u, p).map(w => ({ id: w.id, path: buildAudioPath(w) }));
  state.playlistIndex = 0;
  runAutoplayCycle(partKey);
}

function runAutoplayCycle(partKey) {
  if (!state.isAutoplay || state.playlistIndex >= state.playlist.length) { stopAllAudio(); return; }
  document.querySelectorAll('.word-table tbody tr').forEach(r => r.classList.remove('playing'));
  
  const item = state.playlist[state.playlistIndex];
  const row = document.getElementById(`row-${partKey}-${item.id}`);
  if (row) { row.classList.add('playing'); row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

  state.currentAudio = new Audio(item.path);
  state.currentAudio.onended = () => {
    row?.classList.remove('playing'); state.playlistIndex++;
    setTimeout(() => runAutoplayCycle(partKey), 800);
  };
  state.currentAudio.onerror = () => { row?.classList.remove('playing'); state.playlistIndex++; runAutoplayCycle(partKey); };
  state.currentAudio.play().catch(() => { state.playlistIndex++; runAutoplayCycle(partKey); });
}

/* FLASHCARD ENGINE */
function initFlashcardEngine(partKey) {
  const [u, p] = partKey.split('_');
  state.flashcardPool[partKey] = _shuffle(getWords(u, p));
  state.flashcardIndex[partKey] = 0;
  renderFlashcard(partKey);
}

function renderFlashcard(partKey) {
  const zone = document.getElementById(`flashcard-zone-${partKey}`);
  if (!zone) return;
  const pool = state.flashcardPool[partKey] || [];
  if (pool.length === 0) { zone.innerHTML = `<div class="empty-state">No cards.</div>`; return; }
  
  const idx = state.flashcardIndex[partKey];
  const curr = pool[idx];
  zone.innerHTML = `
    <div class="flashcard-counter">Card <span>${idx + 1}</span> of <span>${pool.length}</span></div>
    <div class="flashcard-scene" onclick="this.classList.toggle('flipped')">
      <div class="flashcard-inner">
        <div class="card-face card-front">
          ${curr.kanji && curr.kanji !== '—' ? `<div class="card-kanji">${curr.kanji}</div>` : ''}
          <div class="card-kana">${s(curr.kana)}</div>
          <button class="card-listen-btn-white" onclick="playCardAudio(event, ${curr.id}, '${buildAudioPath(curr)}', '${partKey}')">🎵</button>
        </div>
        <div class="card-face card-back" onclick="event.stopPropagation();">
          <div class="card-meaning">${s(curr.meaning)}</div>
          <div class="card-kana-small">${s(curr.kana)} ${curr.hanviet ? `(${curr.hanviet})` : ''}</div>
          <button class="card-listen-btn" onclick="playCardAudio(event, ${curr.id}, '${buildAudioPath(curr)}', '${partKey}')">🎵</button>
        </div>
      </div>
    </div>
    <div class="flashcard-nav">
      <button class="nav-arrow" onclick="moveFlashcard('${partKey}', -1)">◀</button>
      <div class="flashcard-progress-bar"><div class="flashcard-progress-fill" style="width: ${((idx + 1) / pool.length) * 100}%"></div></div>
      <button class="nav-arrow" onclick="moveFlashcard('${partKey}', 1)">▶</button>
    </div>`;
}

function moveFlashcard(partKey, dir) {
  const len = (state.flashcardPool[partKey] || []).length;
  if (len === 0) return;
  state.flashcardIndex[partKey] = (state.flashcardIndex[partKey] + dir + len) % len;
  renderFlashcard(partKey);
}

/* QUIZ ENGINE */
function initQuizEngine(partKey) {
  const [u, p] = partKey.split('_');
  const words = getWords(u, p);
  const qList = words.map(w => {
    const dist = _shuffle(vocabularyData.filter(item => item.meaning !== w.meaning)).slice(0, 3).map(item => item.meaning);
    return { word: w, choices: _shuffle([w.meaning, ...dist]), selected: null, status: 'unanswered' };
  });
  state.quizState[partKey] = { index: 0, score: 0, questions: _shuffle(qList) };
  document.getElementById(`quiz-zone-${partKey}`).style.display = 'flex';
  document.getElementById(`quiz-review-${partKey}`).style.display = 'none';
  renderQuizQuestion(partKey);
}

function renderQuizQuestion(partKey) {
  const zone = document.getElementById(`quiz-zone-${partKey}`);
  const quiz = state.quizState[partKey];
  if (!zone || !quiz) return;
  const q = quiz.questions[quiz.index];
  const labels = ['A', 'B', 'C', 'D'];

  zone.innerHTML = `
    <div class="quiz-header">
      <div class="quiz-progress-track"><div class="quiz-progress-fill" style="width: ${(quiz.index / quiz.questions.length) * 100}%"></div></div>
      <div class="quiz-score">Score: ${quiz.score}/${quiz.questions.length}</div>
    </div>
    <div class="quiz-card">
      <div class="quiz-question-label"><span class="quiz-q-number">Q${quiz.index + 1}</span> Multiple Choice</div>
      <div class="quiz-word-display">
        <div>
          ${q.word.kanji && q.word.kanji !== '—' ? `<div class="quiz-word-kanji">${q.word.kanji}</div>` : ''}
          <div class="quiz-word-kana">${s(q.word.kana)}</div>
        </div>
        <button class="quiz-listen-btn" onclick="playSingleAudio(${q.word.id}, '${buildAudioPath(q.word)}', '${partKey}')">🎵</button>
      </div>
      <div class="quiz-choices">
        ${q.choices.map((c, i) => {
          let cl = ''; if (q.status !== 'unanswered') cl = (c === q.word.meaning) ? 'correct' : (c === q.selected ? 'wrong' : '');
          return `<button class="choice-btn ${cl}" ${q.status !== 'unanswered' ? 'disabled' : ''} onclick="submitQuizAnswer('${partKey}', '${escAttr(c)}')"><span class="choice-label">${labels[i]}</span> ${s(c)}</button>`;
        }).join('')}
      </div>
      ${q.status !== 'unanswered' ? `<div style="margin-top:20px; text-align:right;"><button class="btn btn-primary" onclick="nextQuizQuestion('${partKey}')">${quiz.index + 1 === quiz.questions.length ? 'Finish' : 'Next ➜'}</button></div>` : ''}
    </div>`;
}

function submitQuizAnswer(partKey, ans) {
  const quiz = state.quizState[partKey]; const q = quiz.questions[quiz.index];
  if (q.status !== 'unanswered') return;
  q.selected = ans; q.status = (ans === q.word.meaning) ? 'correct' : 'wrong';
  if (q.status === 'correct') quiz.score++;
  renderQuizQuestion(partKey);
}

function nextQuizQuestion(partKey) {
  const quiz = state.quizState[partKey];
  if (quiz.index + 1 < quiz.questions.length) { quiz.index++; renderQuizQuestion(partKey); } 
  else {
    document.getElementById(`quiz-zone-${partKey}`).style.display = 'none';
    const rev = document.getElementById(`quiz-review-${partKey}`);
    const tot = quiz.questions.length; const score = quiz.score; const pct = Math.round((score / tot) * 100);
    localStorage.setItem(`quiz_${partKey}`, `${score}/${tot}`);
    updateGlobalProgress();
    
    // Update Accordion Header Metric
    const meta = document.getElementById(`acc-item-${partKey}`)?.querySelector('.accordion-meta');
    if (meta) {
      meta.innerHTML = `<div class="progress-badge ${score===tot?'complete':'in-progress'}">${score===tot?'✓ Passed ':''}(${score}/${tot})</div>
                        <div class="progress-bar-mini"><div class="progress-bar-mini-fill ${score!==tot?'partial':''}" style="width: ${(score/tot)*100}%"></div></div>`;
    }
    rev.style.display = 'block';
    rev.innerHTML = `
      <div class="review-emoji">${pct >= 80 ? '🎉' : '👍'}</div>
      <div class="review-title">${pct >= 80 ? 'Excellent!' : 'Good Effort!'}</div>
      <div class="review-stats">
        <div class="review-stat"><span class="review-stat-val green">${score}</span><span class="review-stat-label">Correct</span></div>
        <div class="review-stat"><span class="review-stat-val red">${tot - score}</span><span class="review-stat-label">Wrong</span></div>
      </div>
      <button class="btn btn-outline" onclick="initQuizEngine('${partKey}')">🔄 Retry</button>`;
  }
}

/* STROKE ENGINE */
function initStrokeEngine(partKey) {
  const bar = document.getElementById(`stroke-select-${partKey}`);
  if (!bar) return;
  const [u, p] = partKey.split('_');
  const kanjiSet = new Set();
  getWords(u, p).forEach(w => {
    if (w.kanji && w.kanji !== '—') {
      [...w.kanji].forEach(ch => { if (ch.match(/[\u4e00-\u9faf\u3400-\u4dbf]/)) kanjiSet.add(ch); });
    }
  });
  const list = [...kanjiSet];
  if (list.length === 0) { bar.innerHTML = `<span style="font-size:12px; color:var(--ink-mute)">No Kanji.</span>`; return; }
  bar.innerHTML = list.map(k => `<button class="stroke-word-chip" id="chip-${partKey}-${escId(k)}" onclick="selectKanjiStroke('${partKey}', '${escAttr(k)}')">${k}</button>`).join('');
}

function selectKanjiStroke(partKey, kChar) {
  document.querySelectorAll(`#stroke-select-${partKey} .stroke-word-chip`).forEach(c => c.classList.remove('active'));
  document.getElementById(`chip-${partKey}-${escId(kChar)}`)?.classList.add('active');
  const container = document.getElementById(`stroke-kanji-container-${partKey}`);
  if (!container) return;

  _strokeState[partKey] = kChar;
  container.innerHTML = `<div><div class="stroke-char-box" id="stroke-box-${partKey}-${escId(kChar)}" onclick="playStrokes('${partKey}')"></div><div class="stroke-char-label" style="margin-top:8px;">${kChar} (Click to replay)</div></div>`;
  playStrokes(partKey);
}

function playStrokes(partKey) {
  const kChar = _strokeState[partKey]; if (!kChar) return;
  const box = document.getElementById(`stroke-box-${partKey}-${escId(kChar)}`);
  if (!box) return;
  box.textContent = '';
  if (typeof AnimCJK !== 'undefined') {
    try {
      if (typeof AnimCJK.insert === 'function') AnimCJK.insert(box, kChar, { autostart: true, speed: 1.2 });
      else if (typeof AnimCJK === 'function') new AnimCJK(box, kChar, { autostart: true, speed: 1.2 });
      else box.textContent = kChar;
    } catch(e) { box.textContent = kChar; }
  } else box.textContent = kChar;
}

function updateGlobalProgress() {
  const el = document.getElementById('global-progress'); if (!el) return;
  let passed = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith('quiz_')) {
      const [s, t] = localStorage.getItem(k).split('/').map(Number);
      if (s === t && t > 0) passed++;
    }
  }
  el.innerHTML = `Total Progress: <strong>${passed}</strong> Section(s) Passed`;
}
</script>
